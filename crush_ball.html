<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crushing Balls Game</title>
</head>
<style>
  body {
  font-family: 'Arial', sans-serif;
  text-align: center;
  background: #222;
  color: white;
  margin: 0;
  padding: 0;
}

#gameArea {
  position: relative;
  width: 100%;
  height: 80vh;
  border: 2px solid #fff;
  background-color: #111;
  overflow: hidden;
  margin: 0 auto;
}

.ball {
  position: absolute;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: radial-gradient(circle at 10px 10px, #f00, #900);
  cursor: pointer;
  animation: fall linear;
}

@keyframes fall {
  from {
    top: -60px;
  }
  to {
    top: 100%;
  }
}

#score {
  font-size: 24px;
  margin-top: 10px;
}

</style>
<body>
  <h1>🎯 Crushing Balls</h1>
  <p>Click the falling balls to crush them!</p>
  <div id="gameArea"></div>
  <div id="score">Score: 0</div>

  <script>
    const gameArea = document.getElementById('gameArea');
const scoreDisplay = document.getElementById('score');
let score = 0;
let gameInterval;
let voicesReady = false;

// Speak helper
function speak(text) {
  if (!voicesReady) return;
  const utterance = new SpeechSynthesisUtterance(text);
  window.speechSynthesis.speak(utterance);
}

// Create random ball
function createBall() {
  const ball = document.createElement('div');
  ball.classList.add('ball');
  
  const size = 40 + Math.random() * 20;
  ball.style.width = `${size}px`;
  ball.style.height = `${size}px`;

  ball.style.left = `${Math.random() * (gameArea.offsetWidth - size)}px`;
  ball.style.animationDuration = `${3 + Math.random() * 2}s`;

  ball.addEventListener('click', () => {
    score++;
    scoreDisplay.textContent = `Score: ${score}`;
    speak("Nice shot!");
    ball.remove();
  });

  ball.addEventListener('animationend', () => {
    ball.remove();
  });

  gameArea.appendChild(ball);
}

// Game loop
function startGame() {
  score = 0;
  scoreDisplay.textContent = "Score: 0";
  speak("Game started! Crush the balls!");

  gameInterval = setInterval(() => {
    createBall();
  }, 800);
}

// Load voices
window.speechSynthesis.onvoiceschanged = () => {
  voicesReady = true;
};

// Start the game
window.onload = () => {
  speak("Welcome to Crushing Balls! Click to start.");
  gameArea.addEventListener('click', () => {
    if (!gameInterval) startGame();
  });
};

  </script>
</body>
</html>
