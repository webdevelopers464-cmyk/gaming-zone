<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bottle Flip Game</title>
</head>
<style>
    body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(#a1c4fd, #c2e9fb);
  margin: 0;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

#gameArea {
  position: relative;
  height: 400px;
  border: 3px dashed #333;
  margin: 20px auto;
  width: 300px;
  background: #fff;
  overflow: hidden;
  border-radius: 10px;
}

#bottle {
  width: 40px;
  height: 80px;
  background: blue;
  border-radius: 10px;
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  transition: transform 0.6s ease, bottom 0.6s ease;
}

#controls {
  margin: 20px;
}

button, select {
  padding: 10px 20px;
  margin: 5px;
  font-size: 16px;
  border-radius: 5px;
  border: none;
  background-color: #3498db;
  color: white;
  cursor: pointer;
}

button:disabled {
  background-color: grey;
  cursor: not-allowed;
}

#message {
  font-size: 20px;
  font-weight: bold;
  margin-top: 15px;
}

</style>
<body>

  <h1>Bottle Flip Challenge</h1>

  <div id="gameArea">
    <div id="bottle"></div>
  </div>

  <div id="controls">
    <select id="level">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
    <button id="startBtn">Start Game</button>
    <button id="flipBtn" disabled>Flip Bottle</button>
  </div>

  <p id="message"></p>

  <!-- Sound Effects -->
  <audio id="successSound" src="success.mp3"></audio>
  <audio id="failSound" src="fail.mp3"></audio>

  <script>
    const bottle = document.getElementById('bottle');
const flipBtn = document.getElementById('flipBtn');
const startBtn = document.getElementById('startBtn');
const levelSelect = document.getElementById('level');
const message = document.getElementById('message');

const successSound = document.getElementById('successSound');
const failSound = document.getElementById('failSound');

let level = 'easy';
let gameStarted = false;

// Algorithm: flip strength based on level
const levelSettings = {
  easy: { minRotation: 300, maxRotation: 500, successRange: [330, 390] },
  medium: { minRotation: 400, maxRotation: 700, successRange: [360, 420] },
  hard: { minRotation: 500, maxRotation: 900, successRange: [380, 400] }
};

// Start the game
startBtn.addEventListener('click', () => {
  gameStarted = true;
  level = levelSelect.value;
  flipBtn.disabled = false;
  message.textContent = "Ready to flip!";
});

// Flip the bottle
flipBtn.addEventListener('click', () => {
  if (!gameStarted) return;

  const settings = levelSettings[level];
  const rotation = Math.floor(Math.random() * (settings.maxRotation - settings.minRotation) + settings.minRotation);

  bottle.style.transition = "transform 1s ease, bottom 1s ease";
  bottle.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
  bottle.style.bottom = "150px";

  setTimeout(() => {
    bottle.style.transition = "bottom 0.5s ease";
    bottle.style.bottom = "10px";

    checkLanding(rotation % 360, settings.successRange);
  }, 1000);
});

// Check if the bottle landed correctly
function checkLanding(finalAngle, successRange) {
  const [minSuccess, maxSuccess] = successRange;
  
  if (finalAngle >= minSuccess && finalAngle <= maxSuccess) {
    message.textContent = "🎉 Successful Flip!";
    successSound.play();
  } else {
    message.textContent = "❌ Failed! Try Again.";
    failSound.play();
  }
}

  </script>

</body>
</html>
