<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slingshot Game</title>
</head>
<style>
    body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #bce0fd, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#gameMenu {
  text-align: center;
  background: #fff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
</style>
<body>
  <div id="gameMenu">
    <h1>🎯 Slingshot Game</h1>
    <label for="difficulty">Choose Difficulty:</label>
    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
    <button id="startBtn">Start Game</button>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.5.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.5.0/addons/p5.sound.min.js"></script>
  <script>
    let gameStarted = false;
let difficulty = "easy";
let gravity, targetSpeed;
let ball, slingX, slingY, dragging = false;
let targetX, targetY;
let hitSound;
let speakInstructions = true;

function preload() {
  hitSound = loadSound('https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg');
}

function setup() {
  let canvas = createCanvas(800, 600);
  canvas.parent(document.body);
  slingX = 150;
  slingY = height - 100;
  ball = { x: slingX, y: slingY, vx: 0, vy: 0, launched: false };

  document.getElementById('startBtn').onclick = () => {
    difficulty = document.getElementById('difficulty').value;
    startGame();
  };
}

function startGame() {
  gameStarted = true;
  setDifficulty();
  resetBall();
  targetX = width - 100;
  targetY = random(100, height - 100);

  if (speakInstructions) {
    const msg = new SpeechSynthesisUtterance("Pull the ball back and release to hit the moving target!");
    window.speechSynthesis.speak(msg);
    speakInstructions = false;
  }
}

function setDifficulty() {
  if (difficulty === "easy") {
    gravity = 0.2;
    targetSpeed = 1;
  } else if (difficulty === "medium") {
    gravity = 0.4;
    targetSpeed = 2;
  } else {
    gravity = 0.6;
    targetSpeed = 3;
  }
}

function draw() {
  background("#bce0fd");

  if (!gameStarted) return;

  fill(200);
  ellipse(slingX, slingY, 60, 60); // slingshot base

  // target
  fill("red");
  ellipse(targetX, targetY, 50, 50);
  targetY += targetSpeed;
  if (targetY > height || targetY < 0) targetSpeed *= -1;

  // ball drag or flight
  fill("black");
  if (dragging) {
    ball.x = mouseX;
    ball.y = mouseY;
  } else if (ball.launched) {
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vy += gravity;

    // check for hit
    let d = dist(ball.x, ball.y, targetX, targetY);
    if (d < 25) {
      hitSound.play();
      noLoop();
      setTimeout(() => {
        alert("🎯 You hit the target!");
        location.reload();
      }, 500);
    }
  }

  ellipse(ball.x, ball.y, 30, 30);
}

function mousePressed() {
  if (dist(mouseX, mouseY, ball.x, ball.y) < 20 && !ball.launched) {
    dragging = true;
  }
}

function mouseReleased() {
  if (dragging) {
    dragging = false;
    ball.vx = (slingX - ball.x) * 0.2;
    ball.vy = (slingY - ball.y) * 0.2;
    ball.launched = true;
  }
}

function resetBall() {
  ball = { x: slingX, y: slingY, vx: 0, vy: 0, launched: false };
}

  </script>
</body>
</html>
