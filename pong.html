<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beautiful Pong Game</title>
</head>
<style>body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to right, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
  }
  
  .container {
    text-align: center;
  }
  
  #pongCanvas {
    background-color: #1e1e2f;
    border: 4px solid #ffffff;
    border-radius: 12px;
  }
  
  #startButton {
    margin-top: 20px;
    padding: 12px 24px;
    font-size: 18px;
    background-color: #4CAF50;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: background 0.3s;
  }
  
  #startButton:hover {
    background-color: #45a049;
  }
  </style>
<body>

<div class="container">
  <h1>🎮 Beautiful Pong Game 🎮</h1>
  <canvas id="pongCanvas" width="800" height="500"></canvas>
  <button id="startButton">Start Game</button>
</div>

<audio id="scoreSound" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>

<script>
    const canvas = document.getElementById('pongCanvas');
const ctx = canvas.getContext('2d');
const startButton = document.getElementById('startButton');
const scoreSound = document.getElementById('scoreSound');

// Paddle settings
const paddleWidth = 10, paddleHeight = 100;
let player = { x: 10, y: canvas.height/2 - paddleHeight/2, width: paddleWidth, height: paddleHeight, color: '#00ffea', score: 0 };
let ai = { x: canvas.width - 20, y: canvas.height/2 - paddleHeight/2, width: paddleWidth, height: paddleHeight, color: '#ff0055', score: 0 };

// Ball settings
let ball = { x: canvas.width/2, y: canvas.height/2, radius: 10, speed: 5, velocityX: 5, velocityY: 5, color: '#ffffff' };

let gameRunning = false;

// Draw rectangle
function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

// Draw circle
function drawCircle(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2, false);
  ctx.closePath();
  ctx.fill();
}

// Draw text
function drawText(text, x, y) {
  ctx.fillStyle = '#ffffff';
  ctx.font = '40px Arial';
  ctx.fillText(text, x, y);
}

// Reset ball
function resetBall() {
  ball.x = canvas.width/2;
  ball.y = canvas.height/2;
  ball.velocityX = -ball.velocityX;
  ball.speed = 5;
}

// Control player paddle
canvas.addEventListener("mousemove", (evt) => {
  let rect = canvas.getBoundingClientRect();
  player.y = evt.clientY - rect.top - player.height/2;
});

// Collision detection
function collision(b, p) {
  b.top = b.y - b.radius;
  b.bottom = b.y + b.radius;
  b.left = b.x - b.radius;
  b.right = b.x + b.radius;
  
  p.top = p.y;
  p.bottom = p.y + p.height;
  p.left = p.x;
  p.right = p.x + p.width;

  return b.right > p.left && b.top < p.bottom && b.left < p.right && b.bottom > p.top;
}

// Update positions
function update() {
  if (!gameRunning) return;

  ball.x += ball.velocityX;
  ball.y += ball.velocityY;

  // AI movement
  ai.y += ((ball.y - (ai.y + ai.height/2))) * 0.1;

  // Ball collision with top and bottom walls
  if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
    ball.velocityY = -ball.velocityY;
  }

  // Check collision with paddles
  let playerOrAi = (ball.x < canvas.width/2) ? player : ai;
  
  if (collision(ball, playerOrAi)) {
    // Where the ball hit the paddle
    let collidePoint = ball.y - (playerOrAi.y + playerOrAi.height/2);
    collidePoint = collidePoint / (playerOrAi.height/2);

    // Angle
    let angleRad = collidePoint * (Math.PI/4);
    let direction = (ball.x < canvas.width/2) ? 1 : -1;

    ball.velocityX = direction * ball.speed * Math.cos(angleRad);
    ball.velocityY = ball.speed * Math.sin(angleRad);

    ball.speed += 0.5;
  }

  // Score update
  if (ball.x - ball.radius < 0) {
    ai.score++;
    scoreSound.play();
    resetBall();
  } else if (ball.x + ball.radius > canvas.width) {
    player.score++;
    scoreSound.play();
    resetBall();
  }
}

// Render everything
function render() {
  drawRect(0, 0, canvas.width, canvas.height, '#1e1e2f');
  
  drawText(player.score, canvas.width/4, 50);
  drawText(ai.score, 3*canvas.width/4, 50);

  drawRect(player.x, player.y, player.width, player.height, player.color);
  drawRect(ai.x, ai.y, ai.width, ai.height, ai.color);

  drawCircle(ball.x, ball.y, ball.radius, ball.color);
}

// Main game loop
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// Start button
startButton.addEventListener('click', () => {
  if (!gameRunning) {
    gameRunning = true;
    gameLoop();
  }
});

</script>
</body>
</html>
