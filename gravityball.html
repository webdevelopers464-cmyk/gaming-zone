<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gravity Ball Game</title>
</head>
<style>
    body {
  margin: 0;
  background: linear-gradient(to bottom, #74ebd5, #acb6e5);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Arial', sans-serif;
}

.game-container {
  position: relative;
}

#gameCanvas {
  background: #fff;
  border: 2px solid #333;
  display: block;
}

#startButton {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  font-size: 18px;
  cursor: pointer;
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 5px;
}

#levelDisplay {
  text-align: center;
  margin-top: 10px;
  font-size: 20px;
  font-weight: bold;
}

</style>
<body>

<div class="game-container">
  <canvas id="gameCanvas"></canvas>
  <button id="startButton">Start Game</button>
  <div id="levelDisplay">Level: 1</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startButton = document.getElementById('startButton');
const levelDisplay = document.getElementById('levelDisplay');

canvas.width = 400;
canvas.height = 600;

let ball = {
  x: canvas.width / 2,
  y: 50,
  radius: 20,
  color: '#FF5722',
  speedY: 0,
};

let gravity = 0.4;
let bounce = -0.7;
let level = 1;
let gameRunning = false;

// Algorithm to update the ball physics
function updateBall() {
  ball.speedY += gravity;
  ball.y += ball.speedY;

  // Bounce when hitting the bottom
  if (ball.y + ball.radius > canvas.height) {
    ball.y = canvas.height - ball.radius;
    ball.speedY *= bounce;

    // Increase level after each bounce
    level++;
    levelDisplay.textContent = `Level: ${level}`;
    gravity += 0.05; // Make gravity stronger each level
  }
}

// Draw the ball
function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = ball.color;
  ctx.fill();
  ctx.closePath();
}

// Main game loop
function gameLoop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  updateBall();
  drawBall();

  requestAnimationFrame(gameLoop);
}

// Start button event
startButton.addEventListener('click', () => {
  resetGame();
  gameRunning = true;
  gameLoop();
});

// Reset the ball and level
function resetGame() {
  ball.x = canvas.width / 2;
  ball.y = 50;
  ball.speedY = 0;
  gravity = 0.4;
  level = 1;
  levelDisplay.textContent = `Level: ${level}`;
}

</script>
</body>
</html>
