<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breakout Game</title>
</head>
<style>
    body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 0;
}

.container {
  margin-top: 30px;
}

canvas {
  background: #000;
  display: block;
  margin: 20px auto;
  border: 3px solid white;
}

</style>
<body>
  <div class="container">
    <h1>🎮 Breakout Game</h1>
    <select id="level">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
    <button id="startBtn">Start Game</button>
    <p id="instructions"></p>
    <canvas id="gameCanvas" width="480" height="320"></canvas>
    <audio id="hitSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");
const levelSelect = document.getElementById("level");
const instructions = document.getElementById("instructions");
const hitSound = document.getElementById("hitSound");

let ball, paddle, bricks, dx, dy, gameLoop, levelSpeed;
let brickRowCount = 3;
let brickColumnCount = 5;
let brickWidth = 75;
let brickHeight = 20;
let brickPadding = 10;
let brickOffsetTop = 30;
let brickOffsetLeft = 30;

let rightPressed = false;
let leftPressed = false;

function setLevel(level) {
  if (level === "easy") levelSpeed = 2;
  else if (level === "medium") levelSpeed = 3;
  else if (level === "hard") levelSpeed = 4;
}

function initGame() {
  clearInterval(gameLoop);
  setLevel(levelSelect.value);

  instructions.innerText = "🎯 Use Left/Right arrow keys to move the paddle and break all the bricks!";

  paddle = {
    height: 10,
    width: 75,
    x: (canvas.width - 75) / 2
  };

  ball = {
    x: canvas.width / 2,
    y: canvas.height - 30,
    radius: 10,
    speed: levelSpeed
  };

  dx = ball.speed;
  dy = -ball.speed;

  brickColumnCount = levelSelect.value === "easy" ? 5 : levelSelect.value === "medium" ? 7 : 9;

  bricks = [];
  for (let c = 0; c < brickColumnCount; c++) {
    bricks[c] = [];
    for (let r = 0; r < brickRowCount; r++) {
      bricks[c][r] = { x: 0, y: 0, status: 1 };
    }
  }

  document.addEventListener("keydown", keyDownHandler);
  document.addEventListener("keyup", keyUpHandler);

  gameLoop = setInterval(draw, 10);
}

function keyDownHandler(e) {
  if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
  else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
}

function keyUpHandler(e) {
  if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
  else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
}

function collisionDetection() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      const b = bricks[c][r];
      if (b.status === 1) {
        if (
          ball.x > b.x &&
          ball.x < b.x + brickWidth &&
          ball.y > b.y &&
          ball.y < b.y + brickHeight
        ) {
          dy = -dy;
          b.status = 0;
          hitSound.play();
          if (checkWin()) {
            alert("🎉 YOU WIN!");
            clearInterval(gameLoop);
          }
        }
      }
    }
  }
}

function checkWin() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      if (bricks[c][r].status === 1) return false;
    }
  }
  return true;
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "#00ffff";
  ctx.fill();
  ctx.closePath();
}

function drawPaddle() {
  ctx.beginPath();
  ctx.rect(paddle.x, canvas.height - paddle.height, paddle.width, paddle.height);
  ctx.fillStyle = "#00ff00";
  ctx.fill();
  ctx.closePath();
}

function drawBricks() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      if (bricks[c][r].status === 1) {
        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
        bricks[c][r].x = brickX;
        bricks[c][r].y = brickY;

        ctx.beginPath();
        ctx.rect(brickX, brickY, brickWidth, brickHeight);
        ctx.fillStyle = "#ff5722";
        ctx.fill();
        ctx.closePath();
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBricks();
  drawBall();
  drawPaddle();
  collisionDetection();

  // Ball collision with walls
  if (ball.x + dx > canvas.width - ball.radius || ball.x + dx < ball.radius) dx = -dx;
  if (ball.y + dy < ball.radius) dy = -dy;
  else if (ball.y + dy > canvas.height - ball.radius) {
    if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
      dy = -dy;
      hitSound.play();
    } else {
      alert("💥 GAME OVER");
      clearInterval(gameLoop);
    }
  }

  // Paddle movement
  if (rightPressed && paddle.x < canvas.width - paddle.width) paddle.x += 7;
  else if (leftPressed && paddle.x > 0) paddle.x -= 7;

  // Ball movement
  ball.x += dx;
  ball.y += dy;
}

startBtn.addEventListener("click", initGame);

  </script>
</body>
</html>
