<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game - Advanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        /* Menu Screen */
        .menu-screen {
            text-align: center;
            padding: 20px;
        }

        .menu-screen h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: #333;
        }

        .mode-selection {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .mode-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .mode-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .difficulty-section {
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
        }

        .difficulty-section h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #666;
        }

        .difficulty-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .difficulty-btn {
            background: white;
            border: 2px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .difficulty-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .difficulty-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* Game Screen */
        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .turn-indicator {
            font-size: 1.2rem;
            color: #666;
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 10px;
            flex: 1;
            text-align: center;
        }

        .turn-indicator.white {
            background: #fff;
            border: 2px solid #333;
        }

        .turn-indicator.black {
            background: #333;
            color: white;
        }

        .turn-indicator.check {
            background: #ff4444 !important;
            color: white !important;
            border-color: #cc0000 !important;
            animation: checkPulse 0.5s ease-in-out;
        }

        @keyframes checkPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .game-mode-badge {
            font-size: 0.9rem;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border-radius: 8px;
        }

        .chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 0;
            border: 3px solid #333;
            margin: 20px auto;
            max-width: 500px;
            aspect-ratio: 1;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .chessboard.game-over::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        .square {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 3rem;
            user-select: none;
            transition: all 0.2s;
            position: relative;
        }

        .square.light {
            background: #f0d9b5;
        }

        .square.dark {
            background: #b58863;
        }

        .square:hover {
            filter: brightness(0.9);
        }

        .square.selected {
            background: #7cb342 !important;
            box-shadow: inset 0 0 0 3px #558b2f;
        }

        .square.valid-move {
            background: #ffd54f !important;
        }

        .square.valid-move::after {
            content: '';
            position: absolute;
            width: 25%;
            height: 25%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
        }

        .square.valid-move.has-piece::after {
            width: 90%;
            height: 90%;
            background: transparent;
            border: 4px solid rgba(255, 0, 0, 0.5);
            border-radius: 50%;
        }

        /* King in check highlight */
        .square.in-check {
            background: #ff4444 !important;
            animation: checkSquare 0.6s ease-in-out infinite alternate;
        }

        @keyframes checkSquare {
            from { background: #ff4444 !important; }
            to { background: #ff8888 !important; }
        }

        .captured-pieces {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .captured-section {
            flex: 1;
        }

        .captured-section h3 {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #666;
        }

        .captured-list {
            font-size: 1.5rem;
            min-height: 30px;
        }

        .game-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            flex: 1;
            min-width: 120px;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        /* Computer thinking indicator */
        .thinking-indicator {
            text-align: center;
            padding: 10px;
            background: #fff3cd;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .thinking-indicator.active {
            display: block;
        }

        /* Game Over Modal */
        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over-modal.active {
            display: flex;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .game-over-content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .game-over-content .winner {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        /* Pawn Promotion Modal */
        .promotion-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .promotion-modal.active {
            display: flex;
        }

        .promotion-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            animation: slideIn 0.3s ease-out;
        }

        .promotion-content h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .promotion-pieces {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .promotion-piece-btn {
            background: #f0f0f0;
            border: 3px solid #ddd;
            border-radius: 12px;
            width: 80px;
            height: 80px;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .promotion-piece-btn:hover {
            border-color: #667eea;
            background: #eef0ff;
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 15px;
            }

            .game-header h1 {
                font-size: 1.8rem;
            }

            .square {
                font-size: 2rem;
            }

            .mode-btn {
                font-size: 1rem;
                padding: 15px;
            }

            .game-over-content {
                padding: 30px 20px;
                margin: 20px;
            }

            .game-over-content h2 {
                font-size: 2rem;
            }

            .game-over-content .winner {
                font-size: 2.5rem;
            }

            .promotion-piece-btn {
                width: 60px;
                height: 60px;
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>♟️ Chess Game</h1>
        </div>

        <!-- Menu Screen -->
        <div class="menu-screen" id="menuScreen">
            <h2>Select Game Mode</h2>
            <div class="mode-selection">
                <button class="mode-btn" onclick="selectMode('pvp')">
                    <span>👥</span> Player vs Player
                </button>
                <button class="mode-btn" onclick="selectMode('pvc')">
                    <span>🤖</span> Player vs Computer
                </button>
            </div>

            <div class="difficulty-section" id="difficultySection" style="display: none;">
                <h3>Select Difficulty</h3>
                <div class="difficulty-buttons">
                    <button class="difficulty-btn active" onclick="selectDifficulty('easy', event)">
                        😊 Easy
                    </button>
                    <button class="difficulty-btn" onclick="selectDifficulty('hard', event)">
                        😈 Hard
                    </button>
                </div>
                <button class="btn" style="margin-top: 20px; width: 100%;" onclick="startGame()">
                    Start Game
                </button>
            </div>
        </div>

        <!-- Game Screen -->
        <div class="game-screen" id="gameScreen">
            <div class="game-controls">
                <div class="turn-indicator white" id="turnIndicator">White's Turn</div>
                <div class="game-mode-badge" id="gameModeBadge">PvP</div>
            </div>

            <div class="thinking-indicator" id="thinkingIndicator">
                🤔 Computer is thinking...
            </div>

            <div class="chessboard" id="chessboard"></div>

            <div class="captured-pieces">
                <div class="captured-section">
                    <h3>White Captured:</h3>
                    <div class="captured-list" id="whiteCaptured"></div>
                </div>
                <div class="captured-section">
                    <h3>Black Captured:</h3>
                    <div class="captured-list" id="blackCaptured"></div>
                </div>
            </div>

            <div class="game-buttons">
                <button class="btn" onclick="resetGame()">New Game</button>
                <button class="btn btn-secondary" onclick="backToMenu()">Main Menu</button>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="game-over-content">
            <h2>Game Over!</h2>
            <div class="winner" id="winnerIcon"></div>
            <p id="winnerText"></p>
            <div class="modal-buttons">
                <button class="btn" onclick="resetGame(); closeGameOver();">New Game</button>
                <button class="btn btn-secondary" onclick="backToMenu(); closeGameOver();">Main Menu</button>
            </div>
        </div>
    </div>

    <!-- Pawn Promotion Modal -->
    <div class="promotion-modal" id="promotionModal">
        <div class="promotion-content">
            <h3>♟️ Pawn Promotion! Choose a piece:</h3>
            <div class="promotion-pieces" id="promotionPieces"></div>
        </div>
    </div>

    <script>
        // Chess pieces using Unicode symbols
        const pieces = {
            white: { king: '♔', queen: '♕', rook: '♖', bishop: '♗', knight: '♘', pawn: '♙' },
            black: { king: '♚', queen: '♛', rook: '♜', bishop: '♝', knight: '♞', pawn: '♟' }
        };

        // Piece values for AI evaluation
        const pieceValues = {
            '♔': 9000, '♕': 900, '♖': 500, '♗': 300, '♘': 300, '♙': 100,
            '♚': 9000, '♛': 900, '♜': 500, '♝': 300, '♞': 300, '♟': 100
        };

        // Game state
        let board = [];
        let currentTurn = 'white';
        let selectedSquare = null;
        let capturedWhite = [];
        let capturedBlack = [];
        let gameMode = 'pvp';
        let difficulty = 'easy';
        let gameOver = false;

        // NEW: Track castling rights
        let castlingRights = {
            white: { kingSide: true, queenSide: true },
            black: { kingSide: true, queenSide: true }
        };

        // NEW: Track en passant target square (where the capturing pawn lands)
        let enPassantTarget = null; // { row, col }

        // NEW: Promotion pending state
        let pendingPromotion = null; // { row, col, color }

        // Menu functions
        function selectMode(mode) {
            gameMode = mode;
            if (mode === 'pvc') {
                document.getElementById('difficultySection').style.display = 'block';
            } else {
                document.getElementById('difficultySection').style.display = 'none';
                startGame();
            }
        }

        function selectDifficulty(level, event) {
            difficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function startGame() {
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameScreen').classList.add('active');
            document.getElementById('gameModeBadge').textContent =
                gameMode === 'pvp' ? 'PvP' : `vs Computer (${difficulty === 'easy' ? 'Easy' : 'Hard'})`;
            initializeBoard();
        }

        function backToMenu() {
            document.getElementById('menuScreen').style.display = 'block';
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('difficultySection').style.display = 'none';
            gameOver = false;
        }

        // Initialize the board
        function initializeBoard() {
            board = [
                ['♜', '♞', '♝', '♛', '♚', '♝', '♞', '♜'],
                ['♟', '♟', '♟', '♟', '♟', '♟', '♟', '♟'],
                ['', '', '', '', '', '', '', ''],
                ['', '', '', '', '', '', '', ''],
                ['', '', '', '', '', '', '', ''],
                ['', '', '', '', '', '', '', ''],
                ['♙', '♙', '♙', '♙', '♙', '♙', '♙', '♙'],
                ['♖', '♘', '♗', '♕', '♔', '♗', '♘', '♖']
            ];
            currentTurn = 'white';
            selectedSquare = null;
            capturedWhite = [];
            capturedBlack = [];
            gameOver = false;
            enPassantTarget = null;
            pendingPromotion = null;
            castlingRights = {
                white: { kingSide: true, queenSide: true },
                black: { kingSide: true, queenSide: true }
            };
            document.getElementById('chessboard').classList.remove('game-over');
            renderBoard();
            updateTurnIndicator();
            updateCapturedPieces();
        }

        // Render the board
        function renderBoard() {
            const chessboard = document.getElementById('chessboard');
            chessboard.innerHTML = '';

            // Find king positions for check highlighting
            let whiteKingPos = null, blackKingPos = null;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (board[r][c] === '♔') whiteKingPos = { row: r, col: c };
                    if (board[r][c] === '♚') blackKingPos = { row: r, col: c };
                }
            }

            const whiteInCheck = whiteKingPos && isKingInCheck('white', board);
            const blackInCheck = blackKingPos && isKingInCheck('black', board);

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                    square.dataset.row = row;
                    square.dataset.col = col;
                    square.textContent = board[row][col];
                    square.addEventListener('click', () => handleSquareClick(row, col));

                    // Highlight king in check
                    if (whiteInCheck && whiteKingPos && row === whiteKingPos.row && col === whiteKingPos.col) {
                        square.classList.add('in-check');
                    }
                    if (blackInCheck && blackKingPos && row === blackKingPos.row && col === blackKingPos.col) {
                        square.classList.add('in-check');
                    }

                    chessboard.appendChild(square);
                }
            }
        }

        // Handle square click
        function handleSquareClick(row, col) {
            if (gameOver || pendingPromotion) return;
            if (gameMode === 'pvc' && currentTurn === 'black') return;

            const piece = board[row][col];

            if (selectedSquare) {
                const [selectedRow, selectedCol] = selectedSquare;

                if (isValidMove(selectedRow, selectedCol, row, col)) {
                    executeMove(selectedRow, selectedCol, row, col);
                    selectedSquare = null;
                    clearHighlights();

                    if (!gameOver && !pendingPromotion && gameMode === 'pvc' && currentTurn === 'black') {
                        setTimeout(makeComputerMove, 500);
                    }
                } else if (piece && getPieceColor(piece) === currentTurn) {
                    selectedSquare = [row, col];
                    highlightValidMoves(row, col);
                } else {
                    selectedSquare = null;
                    clearHighlights();
                }
            } else {
                if (piece && getPieceColor(piece) === currentTurn) {
                    selectedSquare = [row, col];
                    highlightValidMoves(row, col);
                }
            }
        }

        // ─── CORE MOVE VALIDATION ───────────────────────────────────────────────

        function getPieceColor(piece) {
            if (!piece) return null;
            return Object.values(pieces.white).includes(piece) ? 'white' : 'black';
        }

        function getPieceType(piece) {
            for (let color in pieces) {
                for (let type in pieces[color]) {
                    if (pieces[color][type] === piece) return type;
                }
            }
            return null;
        }

        // Raw move check — does NOT check if it leaves own king in check
        function isRawValidMove(fromRow, fromCol, toRow, toCol, boardState, epTarget) {
            const piece = boardState[fromRow][fromCol];
            if (!piece) return false;
            const targetPiece = boardState[toRow][toCol];
            const pieceType = getPieceType(piece);
            const pieceColor = getPieceColor(piece);

            if (targetPiece && getPieceColor(targetPiece) === pieceColor) return false;

            const rowDiff = toRow - fromRow;
            const colDiff = toCol - fromCol;
            const absRowDiff = Math.abs(rowDiff);
            const absColDiff = Math.abs(colDiff);

            switch (pieceType) {
                case 'pawn': {
                    const direction = pieceColor === 'white' ? -1 : 1;
                    const startRow = pieceColor === 'white' ? 6 : 1;

                    // Move forward one square
                    if (colDiff === 0 && rowDiff === direction && !targetPiece) return true;

                    // Move forward two squares from start
                    if (colDiff === 0 && fromRow === startRow && rowDiff === 2 * direction
                        && !targetPiece && !boardState[fromRow + direction][fromCol]) return true;

                    // Diagonal capture
                    if (absColDiff === 1 && rowDiff === direction && targetPiece) return true;

                    // En passant capture
                    if (absColDiff === 1 && rowDiff === direction && !targetPiece
                        && epTarget && toRow === epTarget.row && toCol === epTarget.col) return true;

                    return false;
                }
                case 'rook':
                    return (rowDiff === 0 || colDiff === 0) && isPathClear(fromRow, fromCol, toRow, toCol, boardState);

                case 'knight':
                    return (absRowDiff === 2 && absColDiff === 1) || (absRowDiff === 1 && absColDiff === 2);

                case 'bishop':
                    return absRowDiff === absColDiff && isPathClear(fromRow, fromCol, toRow, toCol, boardState);

                case 'queen':
                    return (rowDiff === 0 || colDiff === 0 || absRowDiff === absColDiff)
                        && isPathClear(fromRow, fromCol, toRow, toCol, boardState);

                case 'king': {
                    if (absRowDiff <= 1 && absColDiff <= 1) return true;

                    // Castling
                    if (absRowDiff === 0 && absColDiff === 2) {
                        return canCastle(pieceColor, colDiff > 0 ? 'kingSide' : 'queenSide', boardState);
                    }
                    return false;
                }
                default:
                    return false;
            }
        }

        // Full move check: raw valid AND doesn't leave own king in check
        function isValidMove(fromRow, fromCol, toRow, toCol) {
            if (!isRawValidMove(fromRow, fromCol, toRow, toCol, board, enPassantTarget)) return false;

            // Simulate the move
            const simBoard = simulateMove(board, fromRow, fromCol, toRow, toCol, enPassantTarget);
            const color = getPieceColor(board[fromRow][fromCol]);

            // Move is invalid if it leaves own king in check
            if (isKingInCheck(color, simBoard)) return false;

            return true;
        }

        function isPathClear(fromRow, fromCol, toRow, toCol, boardState) {
            const rowStep = toRow > fromRow ? 1 : toRow < fromRow ? -1 : 0;
            const colStep = toCol > fromCol ? 1 : toCol < fromCol ? -1 : 0;
            let r = fromRow + rowStep, c = fromCol + colStep;
            while (r !== toRow || c !== toCol) {
                if (boardState[r][c]) return false;
                r += rowStep; c += colStep;
            }
            return true;
        }

        // ─── CASTLING ────────────────────────────────────────────────────────────

        function canCastle(color, side, boardState) {
            if (!castlingRights[color][side]) return false;

            const row = color === 'white' ? 7 : 0;

            if (side === 'kingSide') {
                // Squares between king (col4) and rook (col7) must be empty
                if (boardState[row][5] || boardState[row][6]) return false;
                // King must not be in check, or pass through check
                if (isKingInCheck(color, boardState)) return false;
                const sim1 = simulateMove(boardState, row, 4, row, 5, null);
                if (isKingInCheck(color, sim1)) return false;
                const sim2 = simulateMove(boardState, row, 4, row, 6, null);
                if (isKingInCheck(color, sim2)) return false;
                return true;
            } else {
                // Queen side: squares between king(col4) and rook(col0) must be empty
                if (boardState[row][3] || boardState[row][2] || boardState[row][1]) return false;
                if (isKingInCheck(color, boardState)) return false;
                const sim1 = simulateMove(boardState, row, 4, row, 3, null);
                if (isKingInCheck(color, sim1)) return false;
                const sim2 = simulateMove(boardState, row, 4, row, 2, null);
                if (isKingInCheck(color, sim2)) return false;
                return true;
            }
        }

        // ─── CHECK DETECTION ─────────────────────────────────────────────────────

        function findKing(color, boardState) {
            const kingPiece = color === 'white' ? '♔' : '♚';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (boardState[r][c] === kingPiece) return { row: r, col: c };
                }
            }
            return null;
        }

        function isKingInCheck(color, boardState) {
            const kingPos = findKing(color, boardState);
            if (!kingPos) return false;
            const opponent = color === 'white' ? 'black' : 'white';

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const p = boardState[r][c];
                    if (p && getPieceColor(p) === opponent) {
                        // Use raw validation (no ep needed for check detection of most pieces)
                        if (isRawValidMove(r, c, kingPos.row, kingPos.col, boardState, null)) return true;
                    }
                }
            }
            return false;
        }

        // ─── SIMULATE MOVE ───────────────────────────────────────────────────────

        function simulateMove(boardState, fromRow, fromCol, toRow, toCol, epTarget) {
            const sim = boardState.map(row => [...row]);
            const piece = sim[fromRow][fromCol];
            const pieceType = getPieceType(piece);
            const pieceColor = getPieceColor(piece);

            // En passant: remove captured pawn
            if (pieceType === 'pawn' && epTarget && toRow === epTarget.row && toCol === epTarget.col && !sim[toRow][toCol]) {
                const capturedRow = pieceColor === 'white' ? toRow + 1 : toRow - 1;
                sim[capturedRow][toCol] = '';
            }

            // Castling: also move rook
            if (pieceType === 'king' && Math.abs(toCol - fromCol) === 2) {
                const row = fromRow;
                if (toCol === 6) { // King side
                    sim[row][5] = sim[row][7];
                    sim[row][7] = '';
                } else if (toCol === 2) { // Queen side
                    sim[row][3] = sim[row][0];
                    sim[row][0] = '';
                }
            }

            sim[toRow][toCol] = piece;
            sim[fromRow][fromCol] = '';
            return sim;
        }

        // ─── ALL LEGAL MOVES FOR A COLOR ─────────────────────────────────────────

        function getAllLegalMoves(color) {
            const moves = [];
            for (let fr = 0; fr < 8; fr++) {
                for (let fc = 0; fc < 8; fc++) {
                    const p = board[fr][fc];
                    if (p && getPieceColor(p) === color) {
                        for (let tr = 0; tr < 8; tr++) {
                            for (let tc = 0; tc < 8; tc++) {
                                if (isValidMove(fr, fc, tr, tc)) {
                                    moves.push({ fromRow: fr, fromCol: fc, toRow: tr, toCol: tc });
                                }
                            }
                        }
                    }
                }
            }
            return moves;
        }

        // ─── EXECUTE MOVE ────────────────────────────────────────────────────────

        function executeMove(fromRow, fromCol, toRow, toCol) {
            const piece = board[fromRow][fromCol];
            const pieceType = getPieceType(piece);
            const pieceColor = getPieceColor(piece);
            const capturedPiece = board[toRow][toCol];

            // Capture piece if exists
            if (capturedPiece) {
                if (currentTurn === 'white') capturedWhite.push(capturedPiece);
                else capturedBlack.push(capturedPiece);
                updateCapturedPieces();
            }

            // En passant capture
            if (pieceType === 'pawn' && enPassantTarget && toRow === enPassantTarget.row && toCol === enPassantTarget.col && !capturedPiece) {
                const capturedPawnRow = pieceColor === 'white' ? toRow + 1 : toRow - 1;
                const epCaptured = board[capturedPawnRow][toCol];
                board[capturedPawnRow][toCol] = '';
                if (currentTurn === 'white') capturedWhite.push(epCaptured);
                else capturedBlack.push(epCaptured);
                updateCapturedPieces();
            }

            // Castling: move rook too
            if (pieceType === 'king' && Math.abs(toCol - fromCol) === 2) {
                const row = fromRow;
                if (toCol === 6) { // King side
                    board[row][5] = board[row][7];
                    board[row][7] = '';
                } else if (toCol === 2) { // Queen side
                    board[row][3] = board[row][0];
                    board[row][0] = '';
                }
                castlingRights[pieceColor].kingSide = false;
                castlingRights[pieceColor].queenSide = false;
            }

            // Update castling rights on king move
            if (pieceType === 'king') {
                castlingRights[pieceColor].kingSide = false;
                castlingRights[pieceColor].queenSide = false;
            }

            // Update castling rights on rook move
            if (pieceType === 'rook') {
                if (pieceColor === 'white') {
                    if (fromCol === 7 && fromRow === 7) castlingRights.white.kingSide = false;
                    if (fromCol === 0 && fromRow === 7) castlingRights.white.queenSide = false;
                } else {
                    if (fromCol === 7 && fromRow === 0) castlingRights.black.kingSide = false;
                    if (fromCol === 0 && fromRow === 0) castlingRights.black.queenSide = false;
                }
            }

            // Set en passant target for next move
            enPassantTarget = null;
            if (pieceType === 'pawn' && Math.abs(toRow - fromRow) === 2) {
                // The en passant landing square is between from and to
                enPassantTarget = {
                    row: (fromRow + toRow) / 2,
                    col: fromCol
                };
            }

            // Move the piece
            board[toRow][toCol] = piece;
            board[fromRow][fromCol] = '';

            // Pawn promotion check
            if (pieceType === 'pawn' && (toRow === 0 || toRow === 7)) {
                pendingPromotion = { row: toRow, col: toCol, color: pieceColor };
                renderBoard();
                updateTurnIndicator();
                showPromotionModal(pieceColor, toRow, toCol);
                return; // Wait for promotion choice before switching turn
            }

            finishTurn();
        }

        function finishTurn() {
            currentTurn = currentTurn === 'white' ? 'black' : 'white';
            renderBoard();
            updateTurnIndicator();
            checkGameState();
        }

        // ─── PAWN PROMOTION ──────────────────────────────────────────────────────

        function showPromotionModal(color, row, col) {
            const modal = document.getElementById('promotionModal');
            const container = document.getElementById('promotionPieces');
            container.innerHTML = '';

            const options = ['queen', 'rook', 'bishop', 'knight'];
            options.forEach(type => {
                const btn = document.createElement('button');
                btn.className = 'promotion-piece-btn';
                btn.textContent = pieces[color][type];
                btn.title = type.charAt(0).toUpperCase() + type.slice(1);
                btn.onclick = () => promotePawn(type);
                container.appendChild(btn);
            });

            modal.classList.add('active');
        }

        function promotePawn(type) {
            if (!pendingPromotion) return;
            const { row, col, color } = pendingPromotion;
            board[row][col] = pieces[color][type];
            pendingPromotion = null;

            document.getElementById('promotionModal').classList.remove('active');

            finishTurn();

            if (!gameOver && gameMode === 'pvc' && currentTurn === 'black') {
                setTimeout(makeComputerMove, 500);
            }
        }

        // ─── GAME STATE CHECK (checkmate / stalemate) ─────────────────────────────

        function checkGameState() {
            const opponent = currentTurn; // It's now the opponent's turn
            const legalMoves = getAllLegalMoves(opponent);

            if (legalMoves.length === 0) {
                if (isKingInCheck(opponent, board)) {
                    // Checkmate! Current player (who just moved) wins
                    const winner = opponent === 'white' ? 'black' : 'white';
                    endGame(winner, 'checkmate');
                } else {
                    // Stalemate — draw
                    endGame(null, 'stalemate');
                }
            }
        }

        // ─── GAME OVER ───────────────────────────────────────────────────────────

        function endGame(winner, reason) {
            gameOver = true;
            document.getElementById('chessboard').classList.add('game-over');

            const modal = document.getElementById('gameOverModal');
            const winnerIcon = document.getElementById('winnerIcon');
            const winnerText = document.getElementById('winnerText');

            if (reason === 'stalemate') {
                winnerIcon.textContent = '🤝';
                winnerText.textContent = 'Stalemate! It\'s a Draw!';
            } else if (winner === 'white') {
                winnerIcon.textContent = '♔';
                winnerText.textContent = 'White Wins by Checkmate!';
            } else {
                winnerIcon.textContent = '♚';
                winnerText.textContent = 'Black Wins by Checkmate!';
            }

            setTimeout(() => modal.classList.add('active'), 500);
        }

        function closeGameOver() {
            document.getElementById('gameOverModal').classList.remove('active');
        }

        // ─── UPDATE UI ───────────────────────────────────────────────────────────

        function highlightValidMoves(row, col) {
            clearHighlights();
            const squares = document.querySelectorAll('.square');
            squares.forEach(square => {
                const r = parseInt(square.dataset.row);
                const c = parseInt(square.dataset.col);
                if (r === row && c === col) {
                    square.classList.add('selected');
                } else if (isValidMove(row, col, r, c)) {
                    square.classList.add('valid-move');
                    if (board[r][c]) square.classList.add('has-piece');
                }
            });
        }

        function clearHighlights() {
            document.querySelectorAll('.square').forEach(square => {
                square.classList.remove('selected', 'valid-move', 'has-piece');
            });
        }

        function updateTurnIndicator() {
            const indicator = document.getElementById('turnIndicator');
            const inCheck = isKingInCheck(currentTurn, board);

            if (inCheck) {
                indicator.textContent = `${currentTurn === 'white' ? 'White' : 'Black'}'s Turn — CHECK! ⚠️`;
                indicator.className = `turn-indicator check`;
            } else {
                indicator.textContent = `${currentTurn === 'white' ? "White's Turn" : "Black's Turn"}`;
                indicator.className = `turn-indicator ${currentTurn}`;
            }
        }

        function updateCapturedPieces() {
            document.getElementById('whiteCaptured').textContent = capturedWhite.join(' ');
            document.getElementById('blackCaptured').textContent = capturedBlack.join(' ');
        }

        // ─── COMPUTER AI ─────────────────────────────────────────────────────────

        function makeComputerMove() {
            if (gameOver || pendingPromotion) return;
            document.getElementById('thinkingIndicator').classList.add('active');

            setTimeout(() => {
                const move = difficulty === 'easy' ? getRandomMove() : getBestMove();
                if (move) {
                    executeMove(move.fromRow, move.fromCol, move.toRow, move.toCol);
                    // Computer always promotes to queen
                    if (pendingPromotion) {
                        promotePawn('queen');
                    }
                }
                document.getElementById('thinkingIndicator').classList.remove('active');
            }, 800);
        }

        function getRandomMove() {
            const moves = getAllLegalMoves('black');
            return moves.length > 0 ? moves[Math.floor(Math.random() * moves.length)] : null;
        }

        function getBestMove() {
            const moves = getAllLegalMoves('black');
            if (!moves.length) return null;

            let bestMove = null;
            let bestScore = -Infinity;

            moves.forEach(move => {
                let score = 0;
                const target = board[move.toRow][move.toCol];
                if (target) score += pieceValues[target] || 0;

                // Check if move gives check (bonus)
                const simBoard = simulateMove(board, move.fromRow, move.fromCol, move.toRow, move.toCol, enPassantTarget);
                if (isKingInCheck('white', simBoard)) score += 50;

                // Center preference
                const centerDist = Math.abs(move.toRow - 3.5) + Math.abs(move.toCol - 3.5);
                score += (7 - centerDist) * 2;
                score += Math.random() * 5;

                if (score > bestScore) { bestScore = score; bestMove = move; }
            });

            return bestMove || getRandomMove();
        }

        // ─── RESET ───────────────────────────────────────────────────────────────

        function resetGame() {
            initializeBoard();
        }
    </script>
