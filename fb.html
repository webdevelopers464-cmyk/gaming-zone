<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flappy Bird Game</title>
</head>
<style>
    body {
  margin: 0;
  padding: 0;
  background: linear-gradient(to bottom, #87ceeb, #f0e68c);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Arial', sans-serif;
}

.game-container {
  position: relative;
}

#gameCanvas {
  background: linear-gradient(#d0f4f7, #ffffff);
  border: 3px solid #4CAF50;
  border-radius: 10px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.3);
}

#startButton {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 30px;
  font-size: 20px;
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}

#startButton:hover {
  background-color: #45a049;
}

</style>
<body>
  <div class="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <button id="startButton">Start Game</button>
  </div>

  <audio id="flapSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>
  <audio id="hitSound" src="https://www.soundjay.com/button/beep-10.wav"></audio>

  <script>
    const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startButton = document.getElementById('startButton');
const flapSound = document.getElementById('flapSound');
const hitSound = document.getElementById('hitSound');

let bird;
let pipes = [];
let gravity = 0.6;
let lift = -12;
let score = 0;
let gameStarted = false;
let gameOver = false;

class Bird {
  constructor() {
    this.x = 64;
    this.y = canvas.height / 2;
    this.radius = 20;
    this.velocity = 0;
  }

  show() {
    ctx.beginPath();
    ctx.fillStyle = "#FFD700";
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.closePath();
  }

  up() {
    this.velocity = lift;
    flapSound.play();
  }

  update() {
    this.velocity += gravity;
    this.y += this.velocity;

    if (this.y > canvas.height - this.radius) {
      this.y = canvas.height - this.radius;
      this.velocity = 0;
      hitSound.play();
      gameOver = true;
    }
    if (this.y < this.radius) {
      this.y = this.radius;
      this.velocity = 0;
    }
  }
}

class Pipe {
  constructor() {
    this.top = Math.random() * (canvas.height / 2);
    this.bottom = canvas.height - (this.top + 150);
    this.x = canvas.width;
    this.width = 40;
    this.speed = 3;
  }

  show() {
    ctx.fillStyle = "#228B22";
    ctx.fillRect(this.x, 0, this.width, this.top);
    ctx.fillRect(this.x, canvas.height - this.bottom, this.width, this.bottom);
  }

  update() {
    this.x -= this.speed;
  }

  hits(bird) {
    if (
      bird.y - bird.radius < this.top ||
      bird.y + bird.radius > canvas.height - this.bottom
    ) {
      if (bird.x + bird.radius > this.x && bird.x - bird.radius < this.x + this.width) {
        return true;
      }
    }
    return false;
  }
}

function drawScore() {
  ctx.fillStyle = "#000";
  ctx.font = "24px Arial";
  ctx.fillText("Score: " + score, 10, 30);
}

function setup() {
  bird = new Bird();
  pipes = [];
  score = 0;
  gameOver = false;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  bird.show();
  bird.update();

  if (gameStarted) {
    if (frameCount % 90 === 0) {
      pipes.push(new Pipe());
    }

    pipes.forEach((pipe, index) => {
      pipe.show();
      pipe.update();

      if (pipe.hits(bird)) {
        hitSound.play();
        gameOver = true;
      }

      if (pipe.x + pipe.width < 0) {
        pipes.splice(index, 1);
        score++;
      }
    });

    drawScore();

    if (!gameOver) {
      frameCount++;
      requestAnimationFrame(draw);
    } else {
      ctx.fillStyle = "red";
      ctx.font = "48px Arial";
      ctx.fillText("Game Over", 90, canvas.height / 2);
      startButton.style.display = "block";
    }
  }
}

let frameCount = 0;

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && gameStarted && !gameOver) {
    bird.up();
  }
});

startButton.addEventListener('click', () => {
  setup();
  startButton.style.display = "none";
  gameStarted = true;
  frameCount = 0;
  draw();
});

  </script>
</body>
</html>
