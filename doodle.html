<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Jump Game</title>
</head>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #87CEEB; /* Light Sky Blue */
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    flex-direction: column;
}

#game-container {
    text-align: center;
}

#gameCanvas {
    background-color: #32CD32; /* Lime Green */
    border: 2px solid white;
    margin-top: 20px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    background-color: #FF6347; /* Tomato */
    color: white;
    cursor: pointer;
    border-radius: 5px;
    margin-top: 20px;
}

button:hover {
    background-color: #FF4500; /* OrangeRed */
}
</style>
<body>
    <div id="game-container">
        <h1>Doodle Jump</h1>
        <button id="start-btn">Start Game</button>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const platformWidth = 100;
const platformHeight = 15;
let player;
let platforms = [];
let gameInterval;
let gravity = 0.5;
let jumpPower = -10;
let gameStarted = false;

// Setting up the canvas dimensions
canvas.width = 800;
canvas.height = 600;

// Create the player object
function createPlayer() {
    player = {
        x: canvas.width / 2 - 25,
        y: canvas.height - 50,
        width: 50,
        height: 50,
        speed: 5,
        velocityY: 0,
        jumping: false
    };
}

// Create a new platform
function createPlatform(x, y) {
    return {
        x: x,
        y: y,
        width: platformWidth,
        height: platformHeight
    };
}

// Generate random platforms
function generatePlatforms() {
    platforms = [];
    for (let i = 0; i < 5; i++) {
        let x = Math.random() * (canvas.width - platformWidth);
        let y = canvas.height - i * 100 - Math.random() * 50;
        platforms.push(createPlatform(x, y));
    }
}

// Draw the player
function drawPlayer() {
    ctx.fillStyle = "yellow";
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

// Draw the platforms
function drawPlatforms() {
    ctx.fillStyle = "green";
    platforms.forEach(platform => {
        ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
    });
}

// Update the game state
function update() {
    if (!gameStarted) return;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    player.velocityY += gravity;
    player.y += player.velocityY;

    // Check for collisions with platforms
    platforms.forEach(platform => {
        if (player.y + player.height <= platform.y && player.y + player.height + player.velocityY >= platform.y && player.x + player.width > platform.x && player.x < platform.x + platform.width) {
            player.velocityY = jumpPower;
            player.jumping = true;
        }
    });

    // Handle wall collision
    if (player.x <= 0 || player.x + player.width >= canvas.width) {
        player.speed = -player.speed;
    }

    // Handle player bounds
    if (player.y >= canvas.height - player.height) {
        player.y = canvas.height - player.height;
        player.velocityY = 0;
    }

    // Draw player and platforms
    drawPlayer();
    drawPlatforms();

    // Re-generate platforms when they go off-screen
    platforms.forEach(platform => {
        if (platform.y > canvas.height) {
            platform.y = 0;
            platform.x = Math.random() * (canvas.width - platformWidth);
        }
    });

    // Voice effect for jumping
    if (player.velocityY < 0 && player.jumping) {
        const jumpSound = new Audio('jump.mp3');
        jumpSound.play();
        player.jumping = false;
    }
}

// Handle key events for movement
function movePlayer(event) {
    if (event.key === "ArrowLeft") {
        player.x -= player.speed;
    } else if (event.key === "ArrowRight") {
        player.x += player.speed;
    }
}

// Start the game
function startGame() {
    gameStarted = true;
    document.getElementById('start-btn').style.display = 'none';
    createPlayer();
    generatePlatforms();
    gameInterval = setInterval(update, 1000 / 60);
}

// Stop the game
function stopGame() {
    clearInterval(gameInterval);
    alert("Game Over! Try again!");
    location.reload();
}

// Set up event listeners
document.getElementById('start-btn').addEventListener('click', startGame);
window.addEventListener('keydown', movePlayer);

    </script>
</body>
</html>
