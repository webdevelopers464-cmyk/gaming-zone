<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emoji Creator Game</title>
</head>
<style>
    body {
  margin: 0;
  padding: 0;
  font-family: 'Comic Sans MS', cursive, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.game-container {
  text-align: center;
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
}

h1 {
  font-size: 2.5rem;
  color: #ff6b81;
}

button {
  background-color: #ff6b81;
  border: none;
  padding: 12px 20px;
  font-size: 1rem;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 20px;
  transition: background 0.3s ease;
}

button:hover {
  background-color: #ff4757;
}

.emoji-display {
  font-size: 5rem;
  margin: 30px 0;
}

.hidden {
  display: none;
}

</style>
<body>

  <div class="game-container">
    <h1>🎨 Emoji Creator</h1>
    <button id="startButton">Start Creating!</button>
    
    <div id="creatorArea" class="hidden">
      <div class="emoji-display" id="emojiDisplay">😊</div>
      <button id="randomizeButton">Randomize Emoji</button>
    </div>
  </div>

  <script>
    // Voice setup
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.pitch = 1;
  msg.rate = 1;
  msg.volume = 1;
  msg.lang = 'en-US';
  window.speechSynthesis.speak(msg);
}

// Emoji parts
const eyes = ['👀', '😎', '🥸', '😳', '😭'];
const mouths = ['👄', '👅', '🫦', '🤐', '😛'];
const faces = ['😀', '😅', '😂', '🥰', '🤯'];

const emojiDisplay = document.getElementById('emojiDisplay');
const startButton = document.getElementById('startButton');
const creatorArea = document.getElementById('creatorArea');
const randomizeButton = document.getElementById('randomizeButton');

// Start game
startButton.addEventListener('click', () => {
  startButton.style.display = 'none';
  creatorArea.classList.remove('hidden');
  speak("Let's create your emoji!");
});

// Algorithm to randomize emoji
randomizeButton.addEventListener('click', () => {
  const randomFace = faces[Math.floor(Math.random() * faces.length)];
  const randomEyes = eyes[Math.floor(Math.random() * eyes.length)];
  const randomMouth = mouths[Math.floor(Math.random() * mouths.length)];
  
  const combinedEmoji = randomFace + randomEyes + randomMouth;
  emojiDisplay.textContent = combinedEmoji;
  
  speak("Here's your new emoji!");
});

  </script>
</body>
</html>
