<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om Nom Run - Choose Your Character!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B35;
            --secondary: #FFD23F;
            --accent: #00D9FF;
            --danger: #FF1744;
            --success: #00E676;
            --bg-sky: #87CEEB;
            --omnom-green: #B8D949;
            --nelle-green: #A4C639;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
            background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 100%);
            height: 100vh;
            user-select: none;
        }

        #gameCanvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 6px solid #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            background: linear-gradient(180deg, #87CEEB 0%, #FFE5B4 70%, #8B4513 100%);
        }

        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        #score {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Lilita One', cursive;
            font-size: 48px;
            color: #fff;
            text-shadow: 4px 4px 0 var(--primary), 6px 6px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            pointer-events: all;
        }

        .btn {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 24px;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2), 0 8px 20px rgba(0,0,0,0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 rgba(0,0,0,0.2), 0 12px 25px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 rgba(0,0,0,0.2), 0 4px 10px rgba(0,0,0,0.15);
        }

        #jumpBtn {
            background: linear-gradient(135deg, var(--secondary) 0%, #FFA500 100%);
            color: #fff;
        }

        #slideBtn {
            background: linear-gradient(135deg, var(--accent) 0%, #0099CC 100%);
            color: #fff;
        }

        #characterScreen, #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .screen-title {
            font-family: 'Lilita One', cursive;
            font-size: 72px;
            color: var(--secondary);
            text-shadow: 6px 6px 0 var(--primary), 8px 8px 20px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .screen-text {
            font-size: 24px;
            color: #fff;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #characterSelection {
            display: flex;
            gap: 40px;
            margin: 30px 0;
            pointer-events: all;
        }

        .character-card {
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s;
            border: 5px solid transparent;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .character-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .character-card.selected {
            border-color: var(--secondary);
            background: linear-gradient(135deg, #FFE5B4 0%, #FFD700 100%);
            transform: scale(1.1);
        }

        .character-preview {
            width: 200px;
            height: 200px;
            margin-bottom: 15px;
            position: relative;
        }

        .character-name {
            font-family: 'Lilita One', cursive;
            font-size: 32px;
            text-align: center;
            color: #333;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
        }

        #startBtn, #restartBtn, #continueBtn {
            background: linear-gradient(135deg, var(--success) 0%, #00C853 100%);
            color: #fff;
            margin-top: 30px;
            pointer-events: all;
        }

        #powerUpIndicator {
            position: absolute;
            top: 100px;
            right: 30px;
            font-size: 20px;
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 15px;
            display: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            #gameCanvas {
                width: 95vw !important;
                height: auto !important;
            }
            
            #characterSelection {
                flex-direction: column;
                gap: 20px;
            }
            
            .character-card {
                padding: 20px;
            }
            
            .character-preview {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui">
        <div id="score">0</div>
        <div id="powerUpIndicator"></div>
        
        <div id="controls">
            <button id="jumpBtn" class="btn">JUMP ⬆️</button>
            <button id="slideBtn" class="btn">SLIDE ⬇️</button>
        </div>

        <div id="characterScreen">
            <div class="screen-title">🍬 CHOOSE YOUR CHARACTER 🍬</div>
            <div id="characterSelection">
                <div class="character-card selected" data-character="omnom">
                    <canvas class="character-preview" width="200" height="200"></canvas>
                    <div class="character-name">OM NOM</div>
                </div>
                <div class="character-card" data-character="nelle">
                    <canvas class="character-preview" width="200" height="200"></canvas>
                    <div class="character-name">OM NELLE</div>
                </div>
            </div>
            <button id="continueBtn" class="btn">CONTINUE</button>
        </div>

        <div id="startScreen" class="hidden">
            <div class="screen-title">🍬 OM NOM RUN 🍬</div>
            <div class="screen-text" id="characterName"></div>
            <div class="screen-text">Collect candies through Nomville!</div>
            <div class="screen-text">Dodge obstacles and use power-ups!</div>
            <button id="startBtn" class="btn">START GAME</button>
        </div>

        <div id="gameOverScreen" class="hidden">
            <div class="screen-title">GAME OVER!</div>
            <div class="screen-text" id="finalScore"></div>
            <div class="screen-text" id="highScore"></div>
            <button id="restartBtn" class="btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('omNomHighScore') || 0;
        let gameSpeed = 6;
        let frameCount = 0;
        let selectedCharacter = 'omnom';

        // Player
        const player = {
            x: 150,
            y: 400,
            width: 70,
            height: 80,
            velocityY: 0,
            jumping: false,
            sliding: false,
            gravity: 0.8,
            jumpPower: -18,
            bodyColor: '#B8D949',
            darkColor: '#7A9E2F',
            hasBow: false
        };

        // Character definitions
        const characters = {
            omnom: {
                name: 'Om Nom',
                bodyColor: '#B8D949',
                darkColor: '#7A9E2F',
                eyeStyle: 'normal',
                hasBow: false
            },
            nelle: {
                name: 'Om Nelle',
                bodyColor: '#A4C639',
                darkColor: '#6B8E23',
                eyeStyle: 'feminine',
                hasBow: true
            }
        };

        // Game objects
        let obstacles = [];
        let candies = [];
        let powerUps = [];
        let clouds = [];
        let buildings = [];
        let activePowerUp = null;
        let powerUpTimer = 0;

        // Initialize background
        function initBackground() {
            clouds = [];
            buildings = [];
            
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * 150 + 20,
                    width: Math.random() * 80 + 60,
                    speed: Math.random() * 0.5 + 0.3
                });
            }

            for (let i = 0; i < 8; i++) {
                buildings.push({
                    x: i * 150,
                    y: 350,
                    width: Math.random() * 60 + 80,
                    height: Math.random() * 100 + 150,
                    color: `hsl(${Math.random() * 60 + 180}, 40%, ${Math.random() * 20 + 50}%)`
                });
            }
        }

        // Draw character (Om Nom or Om Nelle style)
        function drawCharacter(ctx, x, y, width, height, bodyColor, darkColor, hasBow, eyeStyle, mouthOpen) {
            const centerX = x + width/2;
            const centerY = y + height/2;

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.beginPath();
            ctx.ellipse(centerX, y + height + 5, width/2, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body outline (darker)
            ctx.fillStyle = darkColor;
            ctx.beginPath();
            ctx.arc(centerX, centerY, width/2 + 2, 0, Math.PI * 2);
            ctx.fill();

            // Main body
            const bodyGradient = ctx.createRadialGradient(centerX - 8, centerY - 8, 0, centerX, centerY, width/2);
            bodyGradient.addColorStop(0, '#E8F5CD');
            bodyGradient.addColorStop(0.3, bodyColor);
            bodyGradient.addColorStop(1, darkColor);
            ctx.fillStyle = bodyGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, width/2, 0, Math.PI * 2);
            ctx.fill();

            // Antenna with ball
            ctx.strokeStyle = darkColor;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(centerX, y + 8);
            ctx.lineTo(centerX + 8, y - 10);
            ctx.stroke();

            // Antenna ball
            ctx.fillStyle = bodyColor;
            ctx.beginPath();
            ctx.arc(centerX + 8, y - 10, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = darkColor;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Bow for Om Nelle
            if (hasBow) {
                ctx.fillStyle = '#FF69B4';
                // Left bow
                ctx.beginPath();
                ctx.ellipse(centerX - 20, y + 5, 12, 8, -0.3, 0, Math.PI * 2);
                ctx.fill();
                // Right bow
                ctx.beginPath();
                ctx.ellipse(centerX - 5, y + 5, 12, 8, 0.3, 0, Math.PI * 2);
                ctx.fill();
                // Center
                ctx.beginPath();
                ctx.arc(centerX - 12, y + 5, 5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Eyes
            const eyeY = y + 22;
            const eyeWidth = eyeStyle === 'feminine' ? 16 : 18;
            const eyeHeight = eyeStyle === 'feminine' ? 20 : 18;

            // White of eyes
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.ellipse(centerX - 12, eyeY, eyeWidth, eyeHeight, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(centerX + 12, eyeY, eyeWidth, eyeHeight, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eye outlines
            ctx.strokeStyle = '#2D2D2D';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.ellipse(centerX - 12, eyeY, eyeWidth, eyeHeight, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.ellipse(centerX + 12, eyeY, eyeWidth, eyeHeight, 0, 0, Math.PI * 2);
            ctx.stroke();

            // Pupils
            const pupilSize = eyeStyle === 'feminine' ? 7 : 9;
            ctx.fillStyle = '#1A1A1A';
            
            if (eyeStyle === 'feminine') {
                // Om Nelle - slightly sleepy/cute eyes
                ctx.beginPath();
                ctx.ellipse(centerX - 12, eyeY + 2, pupilSize - 2, pupilSize, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(centerX + 12, eyeY + 2, pupilSize - 2, pupilSize, 0, 0, Math.PI * 2);
                ctx.fill();

                // Eyelashes
                ctx.strokeStyle = '#2D2D2D';
                ctx.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    const angle = -Math.PI/4 + (i * Math.PI/8);
                    ctx.beginPath();
                    ctx.moveTo(centerX - 12 + Math.cos(angle) * eyeWidth, eyeY + Math.sin(angle) * eyeHeight);
                    ctx.lineTo(centerX - 12 + Math.cos(angle) * (eyeWidth + 6), eyeY + Math.sin(angle) * (eyeHeight + 6));
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(centerX + 12 + Math.cos(angle) * eyeWidth, eyeY + Math.sin(angle) * eyeHeight);
                    ctx.lineTo(centerX + 12 + Math.cos(angle) * (eyeWidth + 6), eyeY + Math.sin(angle) * (eyeHeight + 6));
                    ctx.stroke();
                }
            } else {
                // Om Nom - regular round pupils
                ctx.beginPath();
                ctx.arc(centerX - 12, eyeY, pupilSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(centerX + 12, eyeY, pupilSize, 0, Math.PI * 2);
                ctx.fill();
            }

            // Eye shine
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(centerX - 15, eyeY - 5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX + 9, eyeY - 5, 3, 0, Math.PI * 2);
            ctx.fill();

            // Mouth
            const mouthY = y + 50;
            
            if (mouthOpen) {
                // Open mouth
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.ellipse(centerX, mouthY, 20, 18, 0, 0, Math.PI * 2);
                ctx.fill();

                // Mouth outline
                ctx.strokeStyle = '#2D2D2D';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Tongue
                ctx.fillStyle = '#FF6B9D';
                ctx.beginPath();
                ctx.ellipse(centerX, mouthY + 8, 12, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                // Teeth
                ctx.fillStyle = '#FFFFFF';
                const teethCount = 4;
                for (let i = 0; i < teethCount; i++) {
                    const teethX = centerX - 15 + (i * 10);
                    ctx.beginPath();
                    ctx.moveTo(teethX, mouthY - 15);
                    ctx.lineTo(teethX + 4, mouthY - 10);
                    ctx.lineTo(teethX + 8, mouthY - 15);
                    ctx.closePath();
                    ctx.fill();
                }
            } else {
                // Closed happy smile
                ctx.strokeStyle = '#2D2D2D';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(centerX, mouthY - 5, 18, 0.3, Math.PI - 0.3);
                ctx.stroke();
            }

            // Arms
            const armY = centerY;
            ctx.fillStyle = bodyColor;
            ctx.strokeStyle = darkColor;
            ctx.lineWidth = 2;
            
            // Left arm
            ctx.beginPath();
            ctx.ellipse(x + 5, armY, 10, 16, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Right arm
            ctx.beginPath();
            ctx.ellipse(x + width - 5, armY, 10, 16, 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Legs
            const legY = y + height - 15;
            ctx.fillStyle = darkColor;
            
            // Left leg
            ctx.beginPath();
            ctx.ellipse(centerX - 12, legY, 12, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Right leg
            ctx.beginPath();
            ctx.ellipse(centerX + 12, legY, 12, 8, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw player
        function drawPlayer() {
            const py = player.sliding ? player.y + 30 : player.y;
            const ph = player.sliding ? player.height - 30 : player.height;
            const mouthOpen = Math.sin(frameCount * 0.1) > 0.5;

            drawCharacter(
                ctx,
                player.x,
                py,
                player.width,
                ph,
                player.bodyColor,
                player.darkColor,
                player.hasBow,
                player.hasBow ? 'feminine' : 'normal',
                mouthOpen
            );
        }

        // Draw background
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.7, '#FFE5B4');
            gradient.addColorStop(1, '#8B4513');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Clouds
            clouds.forEach(cloud => {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.beginPath();
                ctx.ellipse(cloud.x, cloud.y, cloud.width/2, cloud.width/3, 0, 0, Math.PI * 2);
                ctx.ellipse(cloud.x + cloud.width/3, cloud.y - 10, cloud.width/3, cloud.width/4, 0, 0, Math.PI * 2);
                ctx.ellipse(cloud.x - cloud.width/3, cloud.y - 5, cloud.width/3, cloud.width/4, 0, 0, Math.PI * 2);
                ctx.fill();

                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    cloud.x = canvas.width + cloud.width;
                    cloud.y = Math.random() * 150 + 20;
                }
            });

            // Buildings
            buildings.forEach(building => {
                ctx.fillStyle = building.color;
                ctx.fillRect(building.x, building.y, building.width, building.height);
                
                ctx.fillStyle = 'rgba(255, 255, 180, 0.6)';
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 4; j++) {
                        ctx.fillRect(building.x + 10 + i * 25, building.y + 20 + j * 30, 15, 20);
                    }
                }

                building.x -= gameSpeed * 0.3;
                if (building.x + building.width < 0) {
                    building.x = canvas.width;
                    building.height = Math.random() * 100 + 150;
                    building.color = `hsl(${Math.random() * 60 + 180}, 40%, ${Math.random() * 20 + 50}%)`;
                }
            });

            // Ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 480, canvas.width, 120);
            
            ctx.fillStyle = '#A0522D';
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.fillRect(i - (frameCount * gameSpeed) % 40, 480, 30, 10);
            }
        }

        // Spawn obstacles
        function spawnObstacle() {
            const types = ['box', 'cone', 'barrier'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            let obstacle = {
                x: canvas.width,
                type: type,
                passed: false
            };

            if (type === 'box') {
                obstacle.y = 420;
                obstacle.width = 50;
                obstacle.height = 60;
                obstacle.color = '#D2691E';
            } else if (type === 'cone') {
                obstacle.y = 440;
                obstacle.width = 40;
                obstacle.height = 40;
                obstacle.color = '#FF6347';
            } else {
                obstacle.y = 350;
                obstacle.width = 60;
                obstacle.height = 130;
                obstacle.color = '#4A4A4A';
            }

            obstacles.push(obstacle);
        }

        // Spawn candies
        function spawnCandy() {
            candies.push({
                x: canvas.width,
                y: Math.random() * 200 + 200,
                width: 30,
                height: 30,
                collected: false,
                rotation: 0
            });
        }

        // Spawn power-ups
        function spawnPowerUp() {
            const types = ['magnet', 'rocket', 'shield'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            powerUps.push({
                x: canvas.width,
                y: Math.random() * 150 + 250,
                width: 40,
                height: 40,
                type: type,
                collected: false,
                pulse: 0
            });
        }

        // Draw obstacles
        function drawObstacles() {
            obstacles.forEach((obs, index) => {
                if (obs.type === 'box') {
                    ctx.fillStyle = obs.color;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.strokeStyle = '#8B4513';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.beginPath();
                    ctx.moveTo(obs.x, obs.y);
                    ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                    ctx.moveTo(obs.x + obs.width, obs.y);
                    ctx.lineTo(obs.x, obs.y + obs.height);
                    ctx.stroke();
                } else if (obs.type === 'cone') {
                    ctx.fillStyle = obs.color;
                    ctx.beginPath();
                    ctx.moveTo(obs.x + obs.width/2, obs.y);
                    ctx.lineTo(obs.x, obs.y + obs.height);
                    ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(obs.x + 5, obs.y + 15, obs.width - 10, 5);
                    ctx.fillRect(obs.x + 8, obs.y + 25, obs.width - 16, 5);
                } else {
                    ctx.fillStyle = obs.color;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.fillStyle = '#FFD700';
                    for (let i = 0; i < obs.height; i += 20) {
                        ctx.fillRect(obs.x, obs.y + i, obs.width, 10);
                    }
                }

                obs.x -= gameSpeed;

                if (!obs.passed && checkCollision(player, obs)) {
                    if (activePowerUp !== 'shield') {
                        gameOver();
                    } else {
                        obstacles.splice(index, 1);
                    }
                }

                if (!obs.passed && obs.x + obs.width < player.x) {
                    obs.passed = true;
                    score += 10;
                    updateScore();
                }

                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                }
            });
        }

        // Draw candies
        function drawCandies() {
            candies.forEach((candy, index) => {
                candy.rotation += 0.1;
                
                ctx.save();
                ctx.translate(candy.x + candy.width/2, candy.y + candy.height/2);
                ctx.rotate(candy.rotation);
                
                ctx.fillStyle = '#FF69B4';
                ctx.fillRect(-candy.width/2, -candy.height/2, candy.width, candy.height);
                ctx.fillStyle = '#FFB6C1';
                ctx.fillRect(-candy.width/2, -candy.height/2 + 5, candy.width, 5);
                ctx.fillRect(-candy.width/2, -candy.height/2 + 15, candy.width, 5);
                
                ctx.restore();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(candy.x + candy.width/2, candy.y + candy.height/2, 3, 0, Math.PI * 2);
                ctx.fill();

                candy.x -= gameSpeed;

                if (!candy.collected && checkCollision(player, candy)) {
                    candy.collected = true;
                    score += 5;
                    updateScore();
                }

                if (candy.collected || candy.x + candy.width < 0) {
                    candies.splice(index, 1);
                }
            });
        }

        // Draw power-ups
        function drawPowerUps() {
            powerUps.forEach((powerUp, index) => {
                powerUp.pulse += 0.1;
                const scale = 1 + Math.sin(powerUp.pulse) * 0.1;

                ctx.save();
                ctx.translate(powerUp.x + powerUp.width/2, powerUp.y + powerUp.height/2);
                ctx.scale(scale, scale);

                ctx.shadowBlur = 20;
                ctx.shadowColor = powerUp.type === 'magnet' ? '#FF00FF' : 
                                 powerUp.type === 'rocket' ? '#00FFFF' : '#FFD700';

                if (powerUp.type === 'magnet') {
                    ctx.fillStyle = '#FF00FF';
                    ctx.fillRect(-15, -15, 30, 30);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 24px Arial';
                    ctx.fillText('🧲', -12, 5);
                } else if (powerUp.type === 'rocket') {
                    ctx.fillStyle = '#00FFFF';
                    ctx.fillRect(-15, -15, 30, 30);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 24px Arial';
                    ctx.fillText('🚀', -12, 5);
                } else {
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(-15, -15, 30, 30);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 24px Arial';
                    ctx.fillText('🛡️', -12, 5);
                }

                ctx.restore();

                powerUp.x -= gameSpeed;

                if (!powerUp.collected && checkCollision(player, powerUp)) {
                    powerUp.collected = true;
                    activatePowerUp(powerUp.type);
                }

                if (powerUp.collected || powerUp.x + powerUp.width < 0) {
                    powerUps.splice(index, 1);
                }
            });
        }

        // Activate power-up
        function activatePowerUp(type) {
            activePowerUp = type;
            powerUpTimer = 300;
            
            const indicator = document.getElementById('powerUpIndicator');
            indicator.style.display = 'block';
            
            if (type === 'magnet') {
                indicator.textContent = '🧲 MAGNET ACTIVE';
                indicator.style.background = 'rgba(255, 0, 255, 0.8)';
            } else if (type === 'rocket') {
                indicator.textContent = '🚀 ROCKET BOOST';
                indicator.style.background = 'rgba(0, 255, 255, 0.8)';
                gameSpeed *= 1.5;
            } else {
                indicator.textContent = '🛡️ SHIELD ACTIVE';
                indicator.style.background = 'rgba(255, 215, 0, 0.8)';
            }
        }

        // Update power-ups
        function updatePowerUps() {
            if (activePowerUp) {
                powerUpTimer--;
                
                if (activePowerUp === 'magnet') {
                    candies.forEach(candy => {
                        const dx = player.x - candy.x;
                        const dy = (player.y + player.height/2) - (candy.y + candy.height/2);
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 200) {
                            candy.x += dx * 0.1;
                            candy.y += dy * 0.1;
                        }
                    });
                }
                
                if (powerUpTimer <= 0) {
                    if (activePowerUp === 'rocket') {
                        gameSpeed /= 1.5;
                    }
                    activePowerUp = null;
                    document.getElementById('powerUpIndicator').style.display = 'none';
                }
            }
        }

        // Collision detection
        function checkCollision(rect1, rect2) {
            const r1 = {
                x: rect1.x + 5,
                y: rect1.sliding ? rect1.y + 30 : rect1.y,
                width: rect1.width - 10,
                height: rect1.sliding ? rect1.height - 30 : rect1.height
            };

            return r1.x < rect2.x + rect2.width &&
                   r1.x + r1.width > rect2.x &&
                   r1.y < rect2.y + rect2.height &&
                   r1.y + r1.height > rect2.y;
        }

        // Player controls
        function jump() {
            if (!player.jumping && !player.sliding) {
                player.velocityY = player.jumpPower;
                player.jumping = true;
            }
        }

        function slide() {
            if (!player.jumping) {
                player.sliding = true;
                setTimeout(() => {
                    player.sliding = false;
                }, 500);
            }
        }

        // Update player
        function updatePlayer() {
            player.velocityY += player.gravity;
            player.y += player.velocityY;

            if (player.y >= 400) {
                player.y = 400;
                player.velocityY = 0;
                player.jumping = false;
            }
        }

        // Update score
        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('omNomHighScore', highScore);
            }

            document.getElementById('finalScore').textContent = `Score: ${score}`;
            document.getElementById('highScore').textContent = `High Score: ${highScore}`;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            drawObstacles();
            drawCandies();
            drawPowerUps();
            drawPlayer();
            
            updatePlayer();
            updatePowerUps();
            
            frameCount++;

            if (frameCount % 120 === 0) spawnObstacle();
            if (frameCount % 60 === 0) spawnCandy();
            if (frameCount % 300 === 0) spawnPowerUp();

            if (frameCount % 600 === 0) {
                gameSpeed += 0.5;
            }

            requestAnimationFrame(gameLoop);
        }

        // Start game
        function startGame() {
            gameRunning = true;
            score = 0;
            gameSpeed = 6;
            frameCount = 0;
            obstacles = [];
            candies = [];
            powerUps = [];
            activePowerUp = null;
            powerUpTimer = 0;
            player.y = 400;
            player.velocityY = 0;
            player.jumping = false;
            player.sliding = false;
            
            updateScore();
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('powerUpIndicator').style.display = 'none';
            
            gameLoop();
        }

        // Character selection
        function drawCharacterPreview(canvas, character) {
            const ctx = canvas.getContext('2d');
            const charData = characters[character];
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawCharacter(
                ctx,
                50,
                60,
                100,
                120,
                charData.bodyColor,
                charData.darkColor,
                charData.hasBow,
                charData.eyeStyle,
                true
            );
        }

        // Initialize character previews
        document.querySelectorAll('.character-preview').forEach(canvas => {
            const card = canvas.closest('.character-card');
            const character = card.dataset.character;
            drawCharacterPreview(canvas, character);
        });

        // Character selection
        document.querySelectorAll('.character-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.character-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedCharacter = card.dataset.character;
            });
        });

        // Continue to game
        document.getElementById('continueBtn').addEventListener('click', () => {
            const charData = characters[selectedCharacter];
            player.bodyColor = charData.bodyColor;
            player.darkColor = charData.darkColor;
            player.hasBow = charData.hasBow;
            
            document.getElementById('characterName').textContent = `Playing as ${charData.name}`;
            document.getElementById('characterScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        });

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('characterScreen').classList.remove('hidden');
        });
        document.getElementById('jumpBtn').addEventListener('click', jump);
        document.getElementById('slideBtn').addEventListener('click', slide);

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                jump();
            } else if (e.code === 'ArrowDown') {
                e.preventDefault();
                slide();
            }
        });

        // Initialize
        initBackground();
    </script>
</body>
</html>
