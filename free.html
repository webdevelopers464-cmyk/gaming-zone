<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire - Battle Royale Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Teko', sans-serif;
            overflow: hidden;
            background: #000;
            cursor: crosshair;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #90EE90 50%, #8B7355 100%);
        }

        /* HUD */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .top-hud {
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }

        .health-bar {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #ff6b35;
        }

        .health-text {
            color: #fff;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .health-fill-bg {
            width: 200px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6b35);
            transition: width 0.3s;
            border-radius: 10px;
        }

        .kills-counter {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #ff6b35;
            color: #fff;
            font-size: 24px;
            text-align: center;
        }

        .kills-number {
            color: #ff6b35;
            font-size: 32px;
            font-weight: 700;
        }

        .bottom-hud {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .weapon-info {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid #ff6b35;
            color: #fff;
            font-size: 24px;
            text-align: center;
        }

        .ammo {
            color: #ff6b35;
            font-size: 32px;
            font-weight: 700;
        }

        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            pointer-events: none;
            z-index: 200;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: #ff6b35;
            box-shadow: 0 0 10px #ff6b35;
        }

        .crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }

        .crosshair::after {
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
            flex-direction: column;
        }

        .game-over.active {
            display: flex;
        }

        .game-over-title {
            font-size: 80px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .final-score {
            font-size: 48px;
            color: #fff;
            margin-bottom: 40px;
        }

        .restart-btn {
            padding: 20px 60px;
            font-family: 'Teko', sans-serif;
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            border: none;
            border-radius: 15px;
            color: #fff;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.5);
            transition: all 0.3s;
            pointer-events: all;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.7);
        }

        .instructions {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid #ff6b35;
            color: #fff;
            font-size: 18px;
            text-align: center;
            pointer-events: none;
        }

        .kill-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 700;
            color: #ff6b35;
            text-shadow: 0 0 20px #ff6b35;
            opacity: 0;
            pointer-events: none;
            z-index: 250;
            animation: killPop 0.8s;
        }

        @keyframes killPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        .wave-info {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #ff6b35;
            color: #fff;
            font-size: 20px;
        }

        .wave-number {
            color: #ff6b35;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div class="hud">
        <div class="top-hud">
            <div class="health-bar">
                <div class="health-text">HP: <span id="healthValue">100</span></div>
                <div class="health-fill-bg">
                    <div class="health-fill" id="healthBar" style="width: 100%"></div>
                </div>
            </div>
            <div class="wave-info">
                WAVE: <span class="wave-number" id="waveNumber">1</span>
            </div>
            <div class="kills-counter">
                KILLS<br>
                <span class="kills-number" id="killsCount">0</span>
            </div>
        </div>
    </div>

    <div class="crosshair"></div>

    <div class="bottom-hud">
        <div class="weapon-info">
            <div>SCAR</div>
            <div class="ammo"><span id="currentAmmo">30</span> / <span id="totalAmmo">120</span></div>
        </div>
    </div>

    <div class="instructions">
        🎯 MOVE: Arrow Keys/WASD | SHOOT: Click/Space | RELOAD: R
    </div>

    <!-- Game Over Screen -->
    <div class="game-over" id="gameOver">
        <div class="game-over-title">GAME OVER</div>
        <div class="final-score">
            KILLS: <span id="finalKills">0</span><br>
            WAVE: <span id="finalWave">1</span>
        </div>
        <button class="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game state
        let gameRunning = true;
        let kills = 0;
        let wave = 1;
        let enemiesPerWave = 5;

        // Player
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 20,
            speed: 5,
            health: 100,
            maxHealth: 100,
            color: '#ff6b35'
        };

        // Weapon
        const weapon = {
            currentAmmo: 30,
            maxAmmo: 30,
            totalAmmo: 120,
            damage: 25,
            fireRate: 200,
            lastShot: 0,
            reloadTime: 2000,
            isReloading: false
        };

        // Arrays
        let enemies = [];
        let bullets = [];
        let particles = [];

        // Input handling
        const keys = {};
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'r') reload();
            if (e.key === ' ') shoot();
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('click', () => {
            if (gameRunning) shoot();
        });

        // Enemy class
        class Enemy {
            constructor() {
                this.size = 15;
                this.health = 100;
                this.maxHealth = 100;
                this.speed = 1 + Math.random() * 1.5;
                this.color = '#8B0000';
                
                const side = Math.floor(Math.random() * 4);
                switch(side) {
                    case 0:
                        this.x = Math.random() * canvas.width;
                        this.y = -this.size;
                        break;
                    case 1:
                        this.x = canvas.width + this.size;
                        this.y = Math.random() * canvas.height;
                        break;
                    case 2:
                        this.x = Math.random() * canvas.width;
                        this.y = canvas.height + this.size;
                        break;
                    case 3:
                        this.x = -this.size;
                        this.y = Math.random() * canvas.height;
                        break;
                }
            }

            update() {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 2;
                ctx.stroke();

                const barWidth = this.size * 2;
                const barHeight = 4;
                const healthPercent = this.health / this.maxHealth;
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(this.x - barWidth / 2, this.y - this.size - 10, barWidth, barHeight);
                
                ctx.fillStyle = healthPercent > 0.5 ? '#00ff00' : healthPercent > 0.25 ? '#ffff00' : '#ff0000';
                ctx.fillRect(this.x - barWidth / 2, this.y - this.size - 10, barWidth * healthPercent, barHeight);
            }

            takeDamage(damage) {
                this.health -= damage;
                return this.health <= 0;
            }
        }

        // Bullet class
        class Bullet {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                const angle = Math.atan2(targetY - y, targetX - x);
                this.vx = Math.cos(angle) * 15;
                this.vy = Math.sin(angle) * 15;
                this.size = 4;
                this.color = '#ffff00';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            isOffScreen() {
                return this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height;
            }
        }

        // Particle class
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = Math.random() * 4 + 2;
                this.color = color;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            isDead() {
                return this.life <= 0;
            }
        }

        function shoot() {
            if (!gameRunning || weapon.isReloading || weapon.currentAmmo <= 0) return;
            
            const now = Date.now();
            if (now - weapon.lastShot < weapon.fireRate) return;
            
            weapon.lastShot = now;
            weapon.currentAmmo--;
            updateAmmoDisplay();
            
            bullets.push(new Bullet(player.x, player.y, mouseX, mouseY));
            
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(player.x, player.y, '#ffff00'));
            }

            if (weapon.currentAmmo === 0) {
                reload();
            }
        }

        function reload() {
            if (weapon.isReloading || weapon.currentAmmo === weapon.maxAmmo || weapon.totalAmmo === 0) return;
            
            weapon.isReloading = true;
            
            setTimeout(() => {
                const ammoNeeded = weapon.maxAmmo - weapon.currentAmmo;
                const ammoToReload = Math.min(ammoNeeded, weapon.totalAmmo);
                weapon.currentAmmo += ammoToReload;
                weapon.totalAmmo -= ammoToReload;
                weapon.isReloading = false;
                updateAmmoDisplay();
            }, weapon.reloadTime);
        }

        function updateAmmoDisplay() {
            document.getElementById('currentAmmo').textContent = weapon.currentAmmo;
            document.getElementById('totalAmmo').textContent = weapon.totalAmmo;
        }

        function spawnWave() {
            for (let i = 0; i < enemiesPerWave; i++) {
                setTimeout(() => {
                    enemies.push(new Enemy());
                }, i * 500);
            }
        }

        function showKillNotification() {
            const notification = document.createElement('div');
            notification.className = 'kill-notification';
            notification.textContent = '💀 KILL!';
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 800);
        }

        function update() {
            if (!gameRunning) return;

            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

            bullets = bullets.filter(bullet => {
                bullet.update();
                
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];
                    const dist = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
                    
                    if (dist < enemy.size + bullet.size) {
                        if (enemy.takeDamage(weapon.damage)) {
                            enemies.splice(i, 1);
                            kills++;
                            document.getElementById('killsCount').textContent = kills;
                            showKillNotification();
                            
                            for (let j = 0; j < 20; j++) {
                                particles.push(new Particle(enemy.x, enemy.y, '#8B0000'));
                            }
                        } else {
                            for (let j = 0; j < 5; j++) {
                                particles.push(new Particle(enemy.x, enemy.y, '#ff0000'));
                            }
                        }
                        return false;
                    }
                }
                
                return !bullet.isOffScreen();
            });

            enemies.forEach(enemy => {
                enemy.update();
                
                const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (dist < player.size + enemy.size) {
                    player.health -= 0.5;
                    document.getElementById('healthValue').textContent = Math.floor(player.health);
                    document.getElementById('healthBar').style.width = (player.health / player.maxHealth * 100) + '%';
                    
                    if (player.health <= 0) {
                        gameOver();
                    }
                }
            });

            particles = particles.filter(particle => {
                particle.update();
                return !particle.isDead();
            });

            if (enemies.length === 0) {
                wave++;
                enemiesPerWave += 2;
                document.getElementById('waveNumber').textContent = wave;
                spawnWave();
            }
        }

        function draw() {
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#90EE90';
            ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            particles.forEach(particle => particle.draw());
            bullets.forEach(bullet => bullet.draw());
            enemies.forEach(enemy => enemy.draw());

            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(
                player.x + Math.cos(angle) * player.size * 2,
                player.y + Math.sin(angle) * player.size * 2
            );
            ctx.stroke();

            if (weapon.isReloading) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(canvas.width / 2 - 100, canvas.height / 2 - 30, 200, 40);
                ctx.fillStyle = '#ff6b35';
                ctx.font = '24px Teko';
                ctx.textAlign = 'center';
                ctx.fillText('RELOADING...', canvas.width / 2, canvas.height / 2);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('finalWave').textContent = wave;
            document.getElementById('gameOver').classList.add('active');
        }

        function restartGame() {
            gameRunning = true;
            kills = 0;
            wave = 1;
            enemiesPerWave = 5;
            player.health = 100;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            weapon.currentAmmo = 30;
            weapon.totalAmmo = 120;
            enemies = [];
            bullets = [];
            particles = [];
            
            document.getElementById('killsCount').textContent = kills;
            document.getElementById('waveNumber').textContent = wave;
            document.getElementById('healthValue').textContent = player.health;
            document.getElementById('healthBar').style.width = '100%';
            updateAmmoDisplay();
            document.getElementById('gameOver').classList.remove('active');
            
            spawnWave();
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        spawnWave();
        gameLoop();
    </script>
</body>
</html>
