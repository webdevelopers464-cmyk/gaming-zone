<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids Game</title>
</head>
<style>
    /* style.css */
body {
    background: #1e1e1e;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

#game-container {
    text-align: center;
}

#gameCanvas {
    border: 5px solid #fff;
    background: #000;
}

button {
    background-color: #1a73e8;
    color: white;
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    cursor: pointer;
    margin-top: 20px;
    border-radius: 5px;
}

button:hover {
    background-color: #155bb5;
}

</style>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <button id="startBtn">Start Game</button>
    </div>
    <script>
        // script.js
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let startBtn = document.getElementById("startBtn");

let ship, asteroids = [], bullets = [];
let shipSound = new Audio("ship_sound.mp3"); // replace with actual sound file
let explosionSound = new Audio("explosion_sound.mp3"); // replace with actual sound file

let gameInterval, asteroidInterval;

class Ship {
    constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.width = 30;
        this.height = 30;
        this.speed = 5;
        this.angle = 0;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.beginPath();
        ctx.moveTo(0, -this.height / 2);
        ctx.lineTo(-this.width / 2, this.height / 2);
        ctx.lineTo(this.width / 2, this.height / 2);
        ctx.closePath();
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.restore();
    }

    move() {
        if (keys[37]) this.angle -= 0.05; // Left
        if (keys[39]) this.angle += 0.05; // Right
        if (keys[38]) {
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
        }
    }
}

class Bullet {
    constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.speed = 10;
        this.width = 5;
        this.height = 10;
    }

    draw() {
        ctx.beginPath();
        ctx.rect(this.x, this.y, this.width, this.height);
        ctx.fillStyle = "#f00";
        ctx.fill();
    }

    move() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
    }
}

class Asteroid {
    constructor(x, y, radius) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.speed = Math.random() * 3 + 1;
        this.angle = Math.random() * Math.PI * 2;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#888";
        ctx.fill();
    }

    move() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
    }
}

let keys = {};

window.addEventListener("keydown", function (e) {
    keys[e.keyCode] = true;
});

window.addEventListener("keyup", function (e) {
    keys[e.keyCode] = false;
});

function startGame() {
    ship = new Ship();
    asteroids = [];
    bullets = [];
    clearInterval(gameInterval);
    clearInterval(asteroidInterval);

    gameInterval = setInterval(updateGame, 1000 / 60);
    asteroidInterval = setInterval(createAsteroid, 1000);
    startBtn.style.display = "none";
    shipSound.play();
}

function createAsteroid() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height;
    let radius = Math.random() * 20 + 20;
    asteroids.push(new Asteroid(x, y, radius));
}

function checkCollisions() {
    // Bullet-Asteroid collision logic
    for (let i = 0; i < asteroids.length; i++) {
        for (let j = 0; j < bullets.length; j++) {
            let dx = asteroids[i].x - bullets[j].x;
            let dy = asteroids[i].y - bullets[j].y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < asteroids[i].radius) {
                asteroids.splice(i, 1);
                bullets.splice(j, 1);
                explosionSound.play();
                break;
            }
        }
    }

    // Ship-Asteroid collision logic
    for (let i = 0; i < asteroids.length; i++) {
        let dx = asteroids[i].x - ship.x;
        let dy = asteroids[i].y - ship.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < asteroids[i].radius + ship.width / 2) {
            explosionSound.play();
            clearInterval(gameInterval);
            clearInterval(asteroidInterval);
            alert("Game Over");
            startBtn.style.display = "block";
        }
    }
}

function updateGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ship.move();
    ship.draw();

    bullets.forEach(bullet => {
        bullet.move();
        bullet.draw();
    });

    asteroids.forEach(asteroid => {
        asteroid.move();
        asteroid.draw();
    });

    checkCollisions();
}

document.getElementById("startBtn").addEventListener("click", startGame);

    </script>
</body>
</html>
