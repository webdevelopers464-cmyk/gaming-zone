<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emoji Memory Game</title>
</head>
<style>
    body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #74ebd5, #acb6e5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.game-container {
    text-align: center;
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.25);
    width: 90%;
    max-width: 500px;
}

.sections {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
}

.section h3 {
    margin-bottom: 5px;
}

#grid {
    display: grid;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
}

.card {
    width: 70px;
    height: 70px;
    font-size: 2rem;
    background: #f0f0f0;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    user-select: none;
}

.card.flipped {
    background: #fff;
}

.card.matched {
    background: #8ef58e;
    cursor: default;
}

</style>
<body>

    <div class="game-container">
        <h1>Emoji Memory Game</h1>

        <div class="sections">
            <div class="section">
                <h3>Play Mode</h3>
                <select id="playMode">
                    <option value="player">Player vs Player</option>
                    <option value="computer">Player vs Computer</option>
                </select>
            </div>

            <div class="section">
                <h3>Difficulty Level</h3>
                <select id="level">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
        </div>

        <button id="startBtn">Start Game</button>
        
        <div id="grid" class="grid"></div>
    </div>

    <audio id="flipSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_07f1150d91.mp3"></audio>
    <audio id="matchSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_4db54d0f67.mp3"></audio>

    <script>
        const grid = document.getElementById('grid');
const startBtn = document.getElementById('startBtn');
const levelSelect = document.getElementById('level');
const playModeSelect = document.getElementById('playMode');
const flipSound = document.getElementById('flipSound');
const matchSound = document.getElementById('matchSound');

const emojis = ['🍎', '🍌', '🍇', '🍓', '🍍', '🥑', '🍒', '🥥', '🍉', '🍋', '🥝', '🍑'];

let firstCard = null;
let secondCard = null;
let lockBoard = false;
let isComputerTurn = false;

// Configs per level
const levels = {
    easy: 4,    // 4 pairs = 8 cards
    medium: 6,  // 6 pairs = 12 cards
    hard: 8     // 8 pairs = 16 cards
};

startBtn.addEventListener('click', startGame);

function startGame() {
    grid.innerHTML = '';
    firstCard = null;
    secondCard = null;
    lockBoard = false;
    isComputerTurn = false;

    const level = levelSelect.value;
    const mode = playModeSelect.value;
    const pairsCount = levels[level];
    const selectedEmojis = shuffle(emojis).slice(0, pairsCount);
    const gameEmojis = shuffle([...selectedEmojis, ...selectedEmojis]);

    // Dynamic grid columns
    grid.style.gridTemplateColumns = `repeat(${Math.ceil(Math.sqrt(gameEmojis.length))}, 80px)`;

    gameEmojis.forEach(emoji => {
        const card = createCard(emoji);
        grid.appendChild(card);
    });

    if (mode === 'computer') {
        isComputerTurn = Math.random() > 0.5; // Random who starts
        if (isComputerTurn) computerMove();
    }
}

function createCard(emoji) {
    const card = document.createElement('div');
    card.classList.add('card');
    card.dataset.emoji = emoji;
    card.innerHTML = '?';

    card.addEventListener('click', () => {
        if (lockBoard || card.classList.contains('flipped') || (isComputerTurn && playModeSelect.value === 'computer')) return;

        flipCard(card);
        flipSound.currentTime = 0;
        flipSound.play();

        if (!firstCard) {
            firstCard = card;
            return;
        }

        secondCard = card;
        checkMatch();
    });

    return card;
}

function flipCard(card) {
    card.classList.add('flipped');
    card.innerHTML = card.dataset.emoji;
}

function checkMatch() {
    if (firstCard.dataset.emoji === secondCard.dataset.emoji) {
        firstCard.classList.add('matched');
        secondCard.classList.add('matched');
        matchSound.currentTime = 0;
        matchSound.play();
        resetCards();
        checkWin();
    } else {
        lockBoard = true;
        setTimeout(() => {
            firstCard.classList.remove('flipped');
            secondCard.classList.remove('flipped');
            firstCard.innerHTML = '?';
            secondCard.innerHTML = '?';
            resetCards();

            if (playModeSelect.value === 'computer') {
                isComputerTurn = !isComputerTurn;
                if (isComputerTurn) computerMove();
            }
        }, 1000);
    }
}

function resetCards() {
    [firstCard, secondCard] = [null, null];
    lockBoard = false;
}

function shuffle(array) {
    return array.sort(() => 0.5 - Math.random());
}

function computerMove() {
    if (!isComputerTurn) return;

    const unflipped = [...document.querySelectorAll('.card:not(.flipped):not(.matched)')];

    if (unflipped.length < 2) return;

    const first = unflipped[Math.floor(Math.random() * unflipped.length)];
    flipCard(first);

    setTimeout(() => {
        const remaining = unflipped.filter(c => c !== first);
        const second = remaining[Math.floor(Math.random() * remaining.length)];
        flipCard(second);

        firstCard = first;
        secondCard = second;

        checkMatch();
    }, 800);
}

function checkWin() {
    const unmatched = document.querySelectorAll('.card:not(.matched)');
    if (unmatched.length === 0) {
        setTimeout(() => {
            alert('🎉 You Won the Game!');
        }, 500);
    }
}

    </script>

</body>
</html>
