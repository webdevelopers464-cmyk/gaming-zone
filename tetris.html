<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris Game</title>
</head>
<style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background-color: #2b2d42;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.game-container {
  text-align: center;
}

h1 {
  color: #e63946;
}

canvas {
  border: 4px solid #f1faee;
  background-color: #1d3557;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 18px;
  background-color: #f1faee;
  color: #1d3557;
  border: none;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

button:hover {
  background-color: #e63946;
  color: white;
}

</style>
<body>
  <div class="game-container">
    <h1>Tetris Game</h1>
    <canvas id="gameCanvas" width="300" height="600"></canvas>
    <button id="startButton">Start Game</button>
    <audio id="gameAudio" src="game-sound.mp3" preload="auto"></audio>
  </div>

  <script>
    // script.js

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startButton = document.getElementById("startButton");
const gameAudio = document.getElementById("gameAudio");

// Game settings
const ROWS = 20;
const COLS = 10;
const BLOCK_SIZE = 30;

// Colors for blocks
const COLORS = [
  '#ff595e', '#ff8e72', '#ffe156', '#6a4c93', '#2a9d8f', '#264653'
];

// Tetrimino shapes
const SHAPES = [
  [[1, 1, 1], [0, 1, 0]],  // T shape
  [[1, 1, 0], [0, 1, 1]],  // S shape
  [[0, 1, 1], [1, 1, 0]],  // Z shape
  [[1, 1], [1, 1]],        // O shape
  [[1, 0, 0], [1, 1, 1]],  // L shape
  [[0, 0, 1], [1, 1, 1]],  // J shape
  [[1, 1, 1, 1]],          // I shape
];

// Game variables
let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
let currentShape = generateShape();
let currentPos = { row: 0, col: 4 };
let gameInterval;
let isGameOver = false;

// Start the game
startButton.addEventListener("click", () => {
  resetGame();
  gameAudio.play();
  startButton.disabled = true;
  gameInterval = setInterval(updateGame, 500);
});

// Generate a random shape
function generateShape() {
  const shapeIndex = Math.floor(Math.random() * SHAPES.length);
  const shape = SHAPES[shapeIndex];
  const color = COLORS[shapeIndex];
  return { shape, color };
}

// Draw the game grid and current shape
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrid();
  drawShape();
}

// Draw the grid
function drawGrid() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c]) {
        ctx.fillStyle = grid[r][c];
        ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
      }
    }
  }
}

// Draw the current shape
function drawShape() {
  const { shape, color } = currentShape;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (shape[r][c]) {
        ctx.fillStyle = color;
        ctx.fillRect((currentPos.col + c) * BLOCK_SIZE, (currentPos.row + r) * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
      }
    }
  }
}

// Update the game state
function updateGame() {
  if (isGameOver) {
    clearInterval(gameInterval);
    alert("Game Over!");
    return;
  }

  if (canMoveDown()) {
    currentPos.row++;
  } else {
    placeShape();
    currentShape = generateShape();
    currentPos = { row: 0, col: 4 };
    if (!canMoveDown()) {
      isGameOver = true;
    }
  }

  draw();
}

// Check if the current shape can move down
function canMoveDown() {
  const { shape } = currentShape;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (shape[r][c]) {
        const newRow = currentPos.row + r + 1;
        const newCol = currentPos.col + c;
        if (newRow >= ROWS || grid[newRow][newCol]) {
          return false;
        }
      }
    }
  }
  return true;
}

// Place the shape on the grid
function placeShape() {
  const { shape, color } = currentShape;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (shape[r][c]) {
        grid[currentPos.row + r][currentPos.col + c] = color;
      }
    }
  }
  clearFullLines();
}

// Clear full lines
function clearFullLines() {
  for (let r = 0; r < ROWS; r++) {
    if (grid[r].every(cell => cell !== null)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(null));
    }
  }
}

// Reset the game
function resetGame() {
  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  currentShape = generateShape();
  currentPos = { row: 0, col: 4 };
  isGameOver = false;
  startButton.disabled = true;
}

// Keyboard controls (left, right, down)
document.addEventListener("keydown", (event) => {
  if (isGameOver) return;

  if (event.key === "ArrowLeft") {
    if (canMoveLeft()) currentPos.col--;
  }
  if (event.key === "ArrowRight") {
    if (canMoveRight()) currentPos.col++;
  }
  if (event.key === "ArrowDown") {
    updateGame();
  }
  draw();
});

function canMoveLeft() {
  const { shape } = currentShape;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (shape[r][c]) {
        const newCol = currentPos.col + c - 1;
        if (newCol < 0 || grid[currentPos.row + r][newCol]) {
          return false;
        }
      }
    }
  }
  return true;
}

function canMoveRight() {
  const { shape } = currentShape;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (shape[r][c]) {
        const newCol = currentPos.col + c + 1;
        if (newCol >= COLS || grid[currentPos.row + r][newCol]) {
          return false;
        }
      }
    }
  }
  return true;
}

  </script>
</body>
</html>
