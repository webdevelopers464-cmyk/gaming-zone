<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jumping Bunny Adventure</title>
</head>
<style>
  body, html {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Comic Sans MS, cursive;
  background: linear-gradient(#a0e7ff, #fff);
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

#touchControls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

#jumpButton {
  font-size: 24px;
  padding: 15px 30px;
  border: none;
  border-radius: 20px;
  background: pink;
  color: white;
  box-shadow: 0 5px #d16ba5;
}

#info {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 20px;
  color: #fe0505;
}

</style>
<body>
  <div id="game">
    <canvas id="gameCanvas"></canvas>
    <div id="touchControls">
      <button id="jumpButton">Jump</button>
    </div>
    <div id="info">
      <div id="lives">❤️❤️❤️</div>
      <div id="level">Level: 1</div>
    </div>
  </div>
  <audio id="jumpSound" src="jump.mp3" preload="auto"></audio>
  <script>
    const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const jumpSound = document.getElementById("jumpSound");

let level = 1;
let lives = 3;

let groundY = canvas.height - 100; // Platform level

let bunny = {
  x: 100,
  y: groundY,
  width: 50,
  height: 50,
  vy: 0,
  gravity: 0.8,
  jumpStrength: -15,
  onGround: true,
};

function drawBunny() {
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(bunny.x, bunny.y, bunny.width / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.closePath();
}

function updateBunny() {
  bunny.vy += bunny.gravity;
  bunny.y += bunny.vy;

  if (bunny.y >= groundY) {
    bunny.y = groundY;
    bunny.vy = 0;
    bunny.onGround = true;
  }
}

function drawGround() {
  ctx.fillStyle = "#76c893";
  ctx.fillRect(0, groundY + 25, canvas.width, canvas.height - groundY);
}

function drawBackground() {
  ctx.fillStyle = "#a0e7ff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawUI() {
  document.getElementById("lives").innerText = "❤️".repeat(lives);
  document.getElementById("level").innerText = `Level: ${level}`;
}

function jump() {
  if (bunny.onGround) {
    bunny.vy = bunny.jumpStrength;
    bunny.onGround = false;
    jumpSound.play();
  }
}

document.getElementById("jumpButton").addEventListener("touchstart", (e) => {
  e.preventDefault();
  jump();
});
document.getElementById("jumpButton").addEventListener("click", jump);
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") jump();
});

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawGround();
  updateBunny();
  drawBunny();
  drawUI();
  requestAnimationFrame(gameLoop);
}

gameLoop();

  </script>
</body>
</html>
